# Generated using halfpipe cli version 0.0.0-DEV from file e2e/actions/notifications/.halfpipe.io for team halfpipe-team
name: pipeline-name
"on":
  push:
    branches:
    - main
  workflow_dispatch: {}
permissions:
  contents: read
  actions: read
  security-events: write
env:
  ARTIFACTORY_PASSWORD: ${{ secrets.EE_ARTIFACTORY_PASSWORD }}
  ARTIFACTORY_URL: ${{ secrets.EE_ARTIFACTORY_URL }}
  ARTIFACTORY_USERNAME: ${{ secrets.EE_ARTIFACTORY_USERNAME }}
  BUILD_VERSION: 2.${{ github.run_number }}.0
  GIT_REVISION: ${{ github.sha }}
  RUNNING_IN_CI: "true"
  VAULT_ROLE_ID: ${{ secrets.VAULT_ROLE_ID }}
  VAULT_SECRET_ID: ${{ secrets.VAULT_SECRET_ID }}
defaults:
  run:
    working-directory: e2e/actions/notifications
concurrency: ${{ github.workflow }}
jobs:
  my_run_task:
    name: my run task
    runs-on: ee-runner
    timeout-minutes: 60
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        lfs: true
        show-progress: false
        ssh-key: ${{ secrets.EE_GITHUB_PRIVATE_KEY }}
        submodules: recursive
    - name: my run task
      id: my-run-task
      uses: docker://foo
      with:
        args: -c "cd e2e/actions/notifications; \foo"
        entrypoint: /bin/sh
      env:
        CI: "true"
        EAID: APPL-437
        EE_PLATFORM_TEAM: halfpipe-team
        RUNNING_IN_CI: "true"
    - name: 'Notify slack #failure1 (failure)'
      if: failure()
      uses: slackapi/slack-github-action@af78098f536edbc4de71162a307590698245be95 # v3.0.1
      with:
        method: chat.postMessage
        payload: |-
          channel: "#failure1"
          text: "❌ workflow ${{ job.status }} `${{ github.workflow }}` ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        token: ${{ secrets.EE_SLACK_TOKEN }}
    - name: Notify teams (failure)
      if: failure()
      uses: jdcargile/ms-teams-notification@28e5ca976c053d54e2b852f3f38da312f35a24fc # v1.4
      with:
        github-token: ${{ github.token }}
        ms-teams-webhook-uri: http://platform-api.ee.springernature.io/api/v1/message?team=halfpipe-team
        notification-color: dc3545
        notification-summary: ❌ GitHub Actions workflow failed
    - name: 'Notify slack #success1 (success)'
      uses: slackapi/slack-github-action@af78098f536edbc4de71162a307590698245be95 # v3.0.1
      with:
        method: chat.postMessage
        payload: |-
          channel: "#success1"
          text: "success message"
        token: ${{ secrets.EE_SLACK_TOKEN }}
    - name: 'Notify slack #success2 (success)'
      uses: slackapi/slack-github-action@af78098f536edbc4de71162a307590698245be95 # v3.0.1
      with:
        method: chat.postMessage
        payload: |-
          channel: "#success2"
          text: "success message"
        token: ${{ secrets.EE_SLACK_TOKEN }}
    - name: Notify teams (success)
      uses: jdcargile/ms-teams-notification@28e5ca976c053d54e2b852f3f38da312f35a24fc # v1.4
      with:
        github-token: ${{ github.token }}
        ms-teams-webhook-uri: http://platform-api.ee.springernature.io/api/v1/message?team=halfpipe-team
        notification-color: 28a745
        notification-summary: ✅ GitHub Actions workflow passed
