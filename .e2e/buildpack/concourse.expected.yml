# Generated using halfpipe cli version 0.0.0-DEV from file .e2e/buildpack/.halfpipe.io.yml for team halfpipe-team
jobs:
- build_log_retention:
    minimum_succeeded_builds: 1
  name: update
  plan:
  - attempts: 2
    get: git
    timeout: 2h
    trigger: true
  - attempts: 2
    config:
      image_resource:
        name: ""
        source:
          password: ((gcp:platform-gar/token.token))
          registry_mirror:
            host: eu-mirror.gcr.io
          repository: eu.gcr.io/halfpipe-io/halfpipe-auto-update
          tag: latest
          username: oauth2accesstoken
        type: registry-image
      inputs:
      - name: git
      params:
        CONCOURSE_PASSWORD: ((platform/concourse.password))
        CONCOURSE_TEAM: ((platform/concourse.team))
        CONCOURSE_URL: ((platform/concourse.url))
        CONCOURSE_USERNAME: ((platform/concourse.username))
        HALFPIPE_DOMAIN: halfpipe.io
        HALFPIPE_FILE_PATH: .halfpipe.io.yml
        HALFPIPE_PROJECT: halfpipe-io
        PIPELINE_NAME: halfpipe-e2e-buildpack
      platform: linux
      run:
        dir: git/.e2e/buildpack
        path: update-pipeline
    task: update
    timeout: 2h
  - attempts: 2
    no_get: true
    params:
      bump: minor
    put: version
    timeout: 2h
  serial: true
- build_log_retention:
    minimum_succeeded_builds: 1
  name: minimal
  plan:
  - attempts: 2
    in_parallel:
      fail_fast: true
      steps:
      - get: git
        passed:
        - update
      - get: version
        passed:
        - update
        trigger: true
    timeout: 2h
  - config:
      caches:
      - path: ../../../var/halfpipe/cache
      - path: ../../../halfpipe-cache
      image_resource:
        name: ""
        source:
          password: ((gcp:platform-gar/token.token))
          registry_mirror:
            host: eu-mirror.gcr.io
          repository: eu.gcr.io/halfpipe-io/engineering-enablement/halfpipe-docker
          tag: latest
          username: oauth2accesstoken
        type: registry-image
      inputs:
      - name: git
      - name: version
      params:
        ARTIFACTORY_PASSWORD: ((artifactory.password))
        ARTIFACTORY_URL: ((artifactory.url))
        ARTIFACTORY_USERNAME: ((artifactory.username))
        CI: "true"
        EAID: APPL-437
        EE_PLATFORM_TEAM: halfpipe-team
        GAR_TOKEN: ((gcp:platform-gar/token.token))
        RUNNING_IN_CI: "true"
      platform: linux
      run:
        args:
        - -c
        - |
          export GIT_REVISION=`cat ../../.git/ref`
          export BUILD_VERSION=`cat ../../../version/version`
          echo pack build eu.gcr.io/halfpipe-io/halfpipe-e2e-pact \
          --path . \
          --builder paketobuildpacks/builder-jammy-buildpackless-base \
          --buildpack gcr.io/paketo-buildpacks/java:18.5.0 \
          --tag eu.gcr.io/halfpipe-io/halfpipe-e2e-pact:${GIT_REVISION} --tag eu.gcr.io/halfpipe-io/halfpipe-e2e-pact:${BUILD_VERSION}  \
          --cache-image eu.gcr.io/halfpipe-io/halfpipe-e2e-pact:buildcache \
          --env ARTIFACTORY_PASSWORD \
          --env ARTIFACTORY_URL \
          --env ARTIFACTORY_USERNAME \
          --env BUILD_VERSION \
          --env CI \
          --env EAID \
          --env EE_PLATFORM_TEAM \
          --env GIT_REVISION \
          --env RUNNING_IN_CI \
          --publish \
          --trust-builder

          pack build eu.gcr.io/halfpipe-io/halfpipe-e2e-pact \
          --path . \
          --builder paketobuildpacks/builder-jammy-buildpackless-base \
          --buildpack gcr.io/paketo-buildpacks/java:18.5.0 \
          --tag eu.gcr.io/halfpipe-io/halfpipe-e2e-pact:${GIT_REVISION} --tag eu.gcr.io/halfpipe-io/halfpipe-e2e-pact:${BUILD_VERSION}  \
          --cache-image eu.gcr.io/halfpipe-io/halfpipe-e2e-pact:buildcache \
          --env ARTIFACTORY_PASSWORD \
          --env ARTIFACTORY_URL \
          --env ARTIFACTORY_USERNAME \
          --env BUILD_VERSION \
          --env CI \
          --env EAID \
          --env EE_PLATFORM_TEAM \
          --env GIT_REVISION \
          --env RUNNING_IN_CI \
          --publish \
          --trust-builder
        dir: git/.e2e/buildpack
        path: docker.sh
    privileged: true
    task: minimal
    timeout: 1h
  serial: true
