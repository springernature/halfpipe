resources:
- check_every: 10m0s
  name: git
  source:
    branch: main
    paths:
    - .e2e/buildpack
    private_key: ((halfpipe-github.private_key))
    uri: git@github.com:springernature/halfpipe.git
  type: git
- check_every: 24h0m0s
  name: version
  source:
    bucket: ((halfpipe-semver.bucket))
    driver: gcs
    json_key: ((halfpipe-semver.private_key))
    key: halfpipe-team-halfpipe-e2e-buildpack
  type: semver
var_sources:
- config:
    auth_backend: approle
    auth_params:
      role_id: ((platform/team-ro-app-role.vault_approle_id))
      secret_id: ((platform/team-ro-app-role.vault_approle_secret_id))
    lookup_templates:
    - '{{.Secret}}'
    path_prefix: gcp/impersonated-account/
    url: ((platform/team-ro-app-role.vault_addr))
  name: gcp
  type: vault
