# Generated using halfpipe cli version 0.0.0-DEV from file .e2e/buildpack/.halfpipe.io.yml for team halfpipe-team
name: halfpipe-e2e-buildpack
"on":
  push:
    branches:
    - main
    paths:
    - .e2e/buildpack**
    - .github/workflows/halfpipe-e2e-buildpack.yml
  workflow_dispatch: {}
permissions:
  contents: read
  actions: read
  security-events: write
env:
  ARTIFACTORY_PASSWORD: ${{ secrets.EE_ARTIFACTORY_PASSWORD }}
  ARTIFACTORY_URL: ${{ secrets.EE_ARTIFACTORY_URL }}
  ARTIFACTORY_USERNAME: ${{ secrets.EE_ARTIFACTORY_USERNAME }}
  BUILD_VERSION: 2.${{ github.run_number }}.0
  GIT_REVISION: ${{ github.sha }}
  RUNNING_IN_CI: "true"
defaults:
  run:
    working-directory: .e2e/buildpack
concurrency: ${{ github.workflow }}
jobs:
  minimal:
    name: minimal
    runs-on: ee-runner
    timeout-minutes: 60
    steps:
    - name: Generate GitHub App token
      id: app-token
      uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
      with:
        client-id: ${{ secrets.EE_HALFPIPE_BOT_CLIENT_ID }}
        owner: ${{ github.repository_owner }}
        private-key: ${{ secrets.EE_HALFPIPE_BOT_PRIVATE_KEY }}
    - name: Configure git
      run: |-
        git config --global user.name 'halfpipe-bot[bot]'
        git config --global user.email 'halfpipe-bot[bot]@users.noreply.github.com'
        git config --global url."https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/".insteadOf "git@github.com:"
      working-directory: .
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        lfs: true
        show-progress: false
        submodules: recursive
        token: ${{ steps.app-token.outputs.token }}
    - name: minimal
      id: minimal
      uses: springernature/ee-action-buildpack@v1
      with:
        buildEnv: |
          "CI=true"
          "EAID=APPL-437"
          "EE_PLATFORM_TEAM=halfpipe-team"
          "RUNNING_IN_CI=true"
        builder: paketobuildpacks/builder-jammy-buildpackless-base
        buildpacks: gcr.io/paketo-buildpacks/java:18.5.0
        image: eu.gcr.io/halfpipe-io/halfpipe-e2e-pact
        path: .e2e/buildpack
        tags: ${{ env.BUILD_VERSION }},${{ env.GIT_REVISION }}
      env:
        ARTIFACTORY_PASSWORD: ${{ secrets.EE_ARTIFACTORY_PASSWORD }}
        ARTIFACTORY_URL: ${{ secrets.EE_ARTIFACTORY_URL }}
        ARTIFACTORY_USERNAME: ${{ secrets.EE_ARTIFACTORY_USERNAME }}
        BUILD_VERSION: 2.${{ github.run_number }}.0
        CI: "true"
        EAID: APPL-437
        EE_PLATFORM_TEAM: halfpipe-team
        GIT_REVISION: ${{ github.sha }}
        RUNNING_IN_CI: "true"
  with-path-and-builder:
    name: with-path-and-builder
    needs:
    - minimal
    runs-on: ee-runner
    timeout-minutes: 60
    steps:
    - name: Generate GitHub App token
      id: app-token
      uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
      with:
        client-id: ${{ secrets.EE_HALFPIPE_BOT_CLIENT_ID }}
        owner: ${{ github.repository_owner }}
        private-key: ${{ secrets.EE_HALFPIPE_BOT_PRIVATE_KEY }}
    - name: Configure git
      run: |-
        git config --global user.name 'halfpipe-bot[bot]'
        git config --global user.email 'halfpipe-bot[bot]@users.noreply.github.com'
        git config --global url."https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/".insteadOf "git@github.com:"
      working-directory: .
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        lfs: true
        show-progress: false
        submodules: recursive
        token: ${{ steps.app-token.outputs.token }}
    - name: with-path-and-builder
      id: with-path-and-builder
      uses: springernature/ee-action-buildpack@v1
      with:
        buildEnv: |
          "BP_BAR=bar"
          "BP_FOO=foo"
          "CI=true"
          "EAID=APPL-437"
          "EE_PLATFORM_TEAM=halfpipe-team"
          "RUNNING_IN_CI=true"
        builder: paketobuildpacks/builder-jammy-buildpackless-tiny
        buildpacks: gcr.io/paketo-buildpacks/java:18.5.0,gcr.io/paketo-buildpacks/node:18.5.0
        image: eu.gcr.io/halfpipe-io/halfpipe-e2e-pact
        path: .e2e/buildpack/build/libs
        tags: ${{ env.BUILD_VERSION }},${{ env.GIT_REVISION }}
      env:
        ARTIFACTORY_PASSWORD: ${{ secrets.EE_ARTIFACTORY_PASSWORD }}
        ARTIFACTORY_URL: ${{ secrets.EE_ARTIFACTORY_URL }}
        ARTIFACTORY_USERNAME: ${{ secrets.EE_ARTIFACTORY_USERNAME }}
        BP_BAR: bar
        BP_FOO: foo
        BUILD_VERSION: 2.${{ github.run_number }}.0
        CI: "true"
        EAID: APPL-437
        EE_PLATFORM_TEAM: halfpipe-team
        GIT_REVISION: ${{ github.sha }}
        RUNNING_IN_CI: "true"
