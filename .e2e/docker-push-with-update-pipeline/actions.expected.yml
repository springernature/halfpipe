    - name: Repository dispatch
      uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
      with:
        event-type: docker-push:eu.gcr.io/halfpipe-io/halfpipe-team/image3
        token: ${{ secrets.EE_REPOSITORY_DISPATCH_TOKEN }}
  push_with_restore_artifacts_and_file_tag:
    name: push with restore artifacts and file tag
    needs:
    - push_with_restore_artifacts
    runs-on: ee-runner
    timeout-minutes: 60
