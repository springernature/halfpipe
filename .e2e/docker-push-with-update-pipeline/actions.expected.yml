          "BUILD_VERSION"
          "CI=true"
          "EAID=APPL-437"
          "EE_PLATFORM_TEAM=halfpipe-team"
          "GIT_REVISION"
          "RUNNING_IN_CI=true"
        context: .e2e/docker-push-with-update-pipeline
        dockerfile: .e2e/docker-push-with-update-pipeline/Dockerfile
        image: eu.gcr.io/halfpipe-io/halfpipe-team/image3
        platforms: linux/amd64
        secrets: |
          "ARTIFACTORY_PASSWORD=${{ secrets.EE_ARTIFACTORY_PASSWORD }}"
          "ARTIFACTORY_URL=${{ secrets.EE_ARTIFACTORY_URL }}"
          "ARTIFACTORY_USERNAME=${{ secrets.EE_ARTIFACTORY_USERNAME }}"
        tags: |
          latest
