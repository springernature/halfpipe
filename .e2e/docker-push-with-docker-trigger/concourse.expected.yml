jobs:
- build_log_retention:
    minimum_succeeded_builds: 1
  name: push to docker registry
  plan:
  - attempts: 2
    in_parallel:
      fail_fast: true
      steps:
      - get: alpine.tag
        params:
          skip_download: true
        trigger: true
      - get: halfpipe-example-docker-push.docker-push
        trigger: true
      - get: git
        trigger: true
    timeout: 2h
  - config:
      image_resource:
        name: ""
        source:
          repository: alpine
        type: docker-image
        version:
          digest: sha256:25109184c71bdad752c8312a8623239686a9a2071e8825f20acb8f2198c3f659
      inputs:
      - name: git
      outputs:
      - name: tagList
      platform: linux
      run:
        args:
        - -c
        - |-
          GIT_REF=`[ -f git/.git/ref ] && cat git/.git/ref || true`
          VERSION=`[ -f version/version ] && cat version/version || true`
          printf "%s %s latest" "$GIT_REF" "$VERSION" > tagList/tagList
          printf "Image will be tagged with: %s\n" $(cat tagList/tagList)
        path: /bin/sh
    task: create-tag-list
    timeout: 1h
  - config:
      image_resource:
        name: ""
        source:
          password: ((gcp:platform-gar/token.token))
          registry_mirror:
            host: eu-mirror.gcr.io
          repository: eu.gcr.io/halfpipe-io/engineering-enablement/halfpipe-docker
          tag: latest
          username: oauth2accesstoken
        type: registry-image
      inputs:
      - name: git
      - name: tagList
      params:
        A: a
        ARTIFACTORY_PASSWORD: ((artifactory.password))
        ARTIFACTORY_URL: ((artifactory.url))
        ARTIFACTORY_USERNAME: ((artifactory.username))
        B: b
        CI: "true"
        EAID: APPL-437
        EE_PLATFORM_TEAM: halfpipe-team
        GAR_TOKEN: ((gcp:platform-gar/token.token))
        RUNNING_IN_CI: "true"
      platform: linux
      run:
        args:
        - -c
        - |-
          echo $ docker buildx build \
            -f git/.e2e/docker-push-with-docker-trigger/Dockerfile \
            --push \
            --provenance false \
            --platform linux/amd64 \
            --tag eu.gcr.io/halfpipe-io/cache/halfpipe-team/halfpipe-fly:$(cat git/.git/ref) \
            --build-arg A \
            --build-arg ARTIFACTORY_PASSWORD \
            --build-arg ARTIFACTORY_URL \
            --build-arg ARTIFACTORY_USERNAME \
            --build-arg B \
            --build-arg CI \
            --build-arg EAID \
            --build-arg EE_PLATFORM_TEAM \
            --build-arg RUNNING_IN_CI \
            --secret id=ARTIFACTORY_PASSWORD \
            --secret id=ARTIFACTORY_URL \
            --secret id=ARTIFACTORY_USERNAME \
            git/.e2e/docker-push-with-docker-trigger
          docker buildx build \
            -f git/.e2e/docker-push-with-docker-trigger/Dockerfile \
            --push \
            --provenance false \
            --platform linux/amd64 \
            --tag eu.gcr.io/halfpipe-io/cache/halfpipe-team/halfpipe-fly:$(cat git/.git/ref) \
            --build-arg A \
            --build-arg ARTIFACTORY_PASSWORD \
            --build-arg ARTIFACTORY_URL \
            --build-arg ARTIFACTORY_USERNAME \
            --build-arg B \
            --build-arg CI \
            --build-arg EAID \
            --build-arg EE_PLATFORM_TEAM \
            --build-arg RUNNING_IN_CI \
            --secret id=ARTIFACTORY_PASSWORD \
            --secret id=ARTIFACTORY_URL \
            --secret id=ARTIFACTORY_USERNAME \
            git/.e2e/docker-push-with-docker-trigger
        path: docker.sh
    privileged: true
    task: build
    timeout: 1h
  - config:
      image_resource:
        name: ""
        source:
          repository: aquasec/trivy
        type: docker-image
        version:
          digest: sha256:bcc376de8d77cfe086a917230e818dc9f8528e3c852f7b1aff648949b6258d1c
      inputs:
      - name: git
      params:
        TRIVY_PASSWORD: ((gcp:platform-gar/token.token))
        TRIVY_USERNAME: oauth2accesstoken
      platform: linux
      run:
        args:
        - -c
        - |-
          [ -f .trivyignore ] && echo "Ignoring the following CVE's due to .trivyignore" || true
          [ -f .trivyignore ] && cat .trivyignore; echo || true
          trivy image --timeout 15m --ignore-unfixed --severity CRITICAL --scanners vuln --exit-code 0 eu.gcr.io/halfpipe-io/cache/halfpipe-team/halfpipe-fly:$(cat ../../.git/ref) || true
        dir: git/.e2e/docker-push-with-docker-trigger
        path: /bin/sh
    task: trivy
    timeout: 1h
  - config:
      image_resource:
        name: ""
        source:
          password: ((gcp:platform-gar/token.token))
          registry_mirror:
            host: eu-mirror.gcr.io
          repository: eu.gcr.io/halfpipe-io/engineering-enablement/halfpipe-docker
          tag: latest
          username: oauth2accesstoken
        type: registry-image
      inputs:
      - name: git
      - name: tagList
      params:
        GAR_TOKEN: ((gcp:platform-gar/token.token))
      platform: linux
      run:
        args:
        - -c
        - |-
          echo updating tags..
          for tag in $(cat tagList/tagList) ; do docker buildx imagetools create eu.gcr.io/halfpipe-io/cache/halfpipe-team/halfpipe-fly:$(cat git/.git/ref) --tag eu.gcr.io/halfpipe-io/halfpipe-team/halfpipe-fly:$tag; done
        path: docker.sh
    privileged: true
    task: publish-final-image
    timeout: 1h
  serial: true
