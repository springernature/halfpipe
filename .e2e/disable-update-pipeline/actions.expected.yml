# Generated using halfpipe cli version 0.0.0-DEV from file .e2e/disable-update-pipeline/.halfpipe.io.yml for team halfpipe-team
name: halfpipe-e2e-update-pipeline
"on":
  push:
    branches:
    - main
    paths:
    - .e2e/disable-update-pipeline**
    - .github/workflows/halfpipe-e2e-update-pipeline.yml
  schedule:
  - cron: '*/30 * * * *'
  workflow_dispatch: {}
permissions:
  contents: read
  actions: read
  security-events: write
  packages: read
env:
  ARTIFACTORY_PASSWORD: ${{ secrets.EE_ARTIFACTORY_PASSWORD }}
  ARTIFACTORY_URL: ${{ secrets.EE_ARTIFACTORY_URL }}
  ARTIFACTORY_USERNAME: ${{ secrets.EE_ARTIFACTORY_USERNAME }}
  BUILD_VERSION: 2.${{ github.run_number }}.0
  GIT_REVISION: ${{ github.sha }}
  RUNNING_IN_CI: "true"
defaults:
  run:
    working-directory: .e2e/disable-update-pipeline
concurrency: ${{ github.workflow }}
jobs:
  test:
    name: Test
    runs-on: ee-runner
    timeout-minutes: 60
    steps:
    - name: Generate GitHub App token
      id: app-token
      uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
      with:
        client-id: ${{ secrets.EE_HALFPIPE_BOT_CLIENT_ID }}
        owner: ${{ github.repository_owner }}
        private-key: ${{ secrets.EE_HALFPIPE_BOT_PRIVATE_KEY }}
    - name: Configure git
      run: |-
        git config --global user.name 'halfpipe-bot[bot]'
        git config --global user.email 'halfpipe-bot[bot]@users.noreply.github.com'
        git config --global url."https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/".insteadOf "git@github.com:"
      working-directory: .
    - name: Checkout code
      uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      with:
        lfs: true
        show-progress: false
        submodules: recursive
        token: ${{ steps.app-token.outputs.token }}
    - name: Test
      id: test
      uses: docker://node:9.5.0-alpine
      with:
        args: -c "cd .e2e/disable-update-pipeline; ./a"
        entrypoint: /bin/sh
      env:
        CI: "true"
        EAID: APPL-437
        EE_PLATFORM_TEAM: halfpipe-team
        RUNNING_IN_CI: "true"
  docker-compose:
    name: docker-compose
    needs:
    - test
    runs-on: ee-runner
    timeout-minutes: 60
    steps:
    - name: Generate GitHub App token
      id: app-token
      uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
      with:
        client-id: ${{ secrets.EE_HALFPIPE_BOT_CLIENT_ID }}
        owner: ${{ github.repository_owner }}
        private-key: ${{ secrets.EE_HALFPIPE_BOT_PRIVATE_KEY }}
    - name: Configure git
      run: |-
        git config --global user.name 'halfpipe-bot[bot]'
        git config --global user.email 'halfpipe-bot[bot]@users.noreply.github.com'
        git config --global url."https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/".insteadOf "git@github.com:"
      working-directory: .
    - name: Checkout code
      uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      with:
        lfs: true
        show-progress: false
        submodules: recursive
        token: ${{ steps.app-token.outputs.token }}
    - name: docker-compose
      id: docker-compose
      run: |-
        docker-compose \
          -f docker-compose.yml \
          run \
          --use-aliases \
          -e ARTIFACTORY_PASSWORD \
          -e ARTIFACTORY_URL \
          -e ARTIFACTORY_USERNAME \
          -e BUILD_VERSION \
          -e CI \
          -e EAID \
          -e EE_PLATFORM_TEAM \
          -e GIT_REVISION \
          -e RUNNING_IN_CI \
          -v /mnt/halfpipe-cache/halfpipe-team:/var/halfpipe/shared-cache \
          -v /var/run/docker.sock:/var/run/docker.sock \
          app
      env:
        CI: "true"
        EAID: APPL-437
        EE_PLATFORM_TEAM: halfpipe-team
        RUNNING_IN_CI: "true"
    - name: Docker cleanup
      if: always()
      run: docker-compose -f docker-compose.yml down
