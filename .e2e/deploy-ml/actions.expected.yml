# Generated using halfpipe cli version 0.0.0-DEV from file .e2e/deploy-ml/.halfpipe.io.yml for team halfpipe-team
name: pipeline-name
"on":
  push:
    branches:
    - main
  workflow_dispatch: {}
permissions:
  contents: read
  actions: read
  security-events: write
env:
  ARTIFACTORY_PASSWORD: ${{ secrets.EE_ARTIFACTORY_PASSWORD }}
  ARTIFACTORY_URL: ${{ secrets.EE_ARTIFACTORY_URL }}
  ARTIFACTORY_USERNAME: ${{ secrets.EE_ARTIFACTORY_USERNAME }}
  BUILD_VERSION: 2.${{ github.run_number }}.0
  GIT_REVISION: ${{ github.sha }}
  RUNNING_IN_CI: "true"
defaults:
  run:
    working-directory: .e2e/deploy-ml
concurrency: ${{ github.workflow }}
jobs:
  update:
    name: update
    runs-on: ee-runner
    timeout-minutes: 60
    outputs:
      synced: ${{ steps.sync.outputs.synced }}
    steps:
    - name: Generate GitHub App token
      id: app-token
      uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
      with:
        client-id: ${{ secrets.EE_HALFPIPE_BOT_CLIENT_ID }}
        owner: ${{ github.repository_owner }}
        private-key: ${{ secrets.EE_HALFPIPE_BOT_PRIVATE_KEY }}
    - name: Configure git
      run: |-
        git config --global user.name 'halfpipe-bot[bot]'
        git config --global user.email 'halfpipe-bot[bot]@users.noreply.github.com'
        git config --global url."https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/".insteadOf "git@github.com:"
      working-directory: .
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        lfs: true
        show-progress: false
        submodules: recursive
        token: ${{ steps.app-token.outputs.token }}
    - name: Sync workflow with halfpipe manifest
      id: sync
      run: halfpipe-update-workflow
      env:
        HALFPIPE_FILE_PATH: .halfpipe.io.yml
    - name: Commit and push changes to workflow
      if: steps.sync.outputs.synced == 'false'
      run: |
        if git commit -am "[halfpipe] synced workflow $GITHUB_WORKFLOW with halfpipe manifest" && git push; then
          echo ':white_check_mark: Halfpipe successfully updated the workflow' >> $GITHUB_STEP_SUMMARY
          echo >> $GITHUB_STEP_SUMMARY
          echo 'This happened because the workflow was generated from a halfpipe manifest with the `update-pipeline` feature enabled. It keeps the workflow in sync with the halfpipe manifest.' >> $GITHUB_STEP_SUMMARY
          echo >> $GITHUB_STEP_SUMMARY
          echo '[Halfpipe Documentation](https://ee.public.springernature.app/rel-eng/halfpipe/features/#update_pipeline)' >> $GITHUB_STEP_SUMMARY
        else
          echo ':x: Halfpipe failed to update the workflow' >> $GITHUB_STEP_SUMMARY
          echo >> $GITHUB_STEP_SUMMARY
          echo 'This may have happened because newer git commits have already been pushed. Check for newer pipeline runs or manually trigger the workflow.' >> $GITHUB_STEP_SUMMARY
          echo >> $GITHUB_STEP_SUMMARY
          echo '[Halfpipe Documentation](https://ee.public.springernature.app/rel-eng/halfpipe/features/#update_pipeline)' >> $GITHUB_STEP_SUMMARY
          exit 1
        fi
  create_zip_for_ml_task:
    name: create zip for ml task
    needs:
    - update
    if: needs.update.outputs.synced == 'true'
    runs-on: ee-runner
    timeout-minutes: 60
    steps:
    - name: Generate GitHub App token
      id: app-token
      uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
      with:
        client-id: ${{ secrets.EE_HALFPIPE_BOT_CLIENT_ID }}
        owner: ${{ github.repository_owner }}
        private-key: ${{ secrets.EE_HALFPIPE_BOT_PRIVATE_KEY }}
    - name: Configure git
      run: |-
        git config --global user.name 'halfpipe-bot[bot]'
        git config --global user.email 'halfpipe-bot[bot]@users.noreply.github.com'
        git config --global url."https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/".insteadOf "git@github.com:"
      working-directory: .
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        lfs: true
        show-progress: false
        submodules: recursive
        token: ${{ steps.app-token.outputs.token }}
    - name: create zip for ml task
      id: create-zip-for-ml-task
      uses: docker://alpine
      with:
        args: -c "cd .e2e/deploy-ml; \package.sh"
        entrypoint: /bin/sh
      env:
        CI: "true"
        EAID: APPL-437
        EE_PLATFORM_TEAM: halfpipe-team
        RUNNING_IN_CI: "true"
    - name: Package artifacts
      run: tar -cvf /tmp/halfpipe-artifacts-${{ github.job }}.tar .e2e/deploy-ml/target/xquery.zip
      working-directory: ${{ github.workspace }}
    - name: Upload artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: artifacts-${{ github.job }}
        path: /tmp/halfpipe-artifacts-${{ github.job }}.tar
        retention-days: 2
  deploy-ml-zip:
    name: deploy-ml-zip
    needs:
    - create_zip_for_ml_task
    runs-on: ee-runner
    timeout-minutes: 60
    steps:
    - name: Vault secrets
      id: secrets
      uses: hashicorp/vault-action@892a26828f195e65540a40b4768ae4571f51ebfc # v4.0.0
      with:
        exportEnv: false
        method: approle
        roleId: ${{ secrets.VAULT_ROLE_ID }}
        secretId: ${{ secrets.VAULT_SECRET_ID }}
        secrets: |
          /springernature/data/shared/halfpipe-ml-deploy password | springernature_data_shared_halfpipe-ml-deploy_password ;
          /springernature/data/shared/halfpipe-ml-deploy username | springernature_data_shared_halfpipe-ml-deploy_username ;
        url: ${{ secrets.EE_VAULT_ADDR }}
    - name: Generate GitHub App token
      id: app-token
      uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
      with:
        client-id: ${{ secrets.EE_HALFPIPE_BOT_CLIENT_ID }}
        owner: ${{ github.repository_owner }}
        private-key: ${{ secrets.EE_HALFPIPE_BOT_PRIVATE_KEY }}
    - name: Configure git
      run: |-
        git config --global user.name 'halfpipe-bot[bot]'
        git config --global user.email 'halfpipe-bot[bot]@users.noreply.github.com'
        git config --global url."https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/".insteadOf "git@github.com:"
      working-directory: .
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        lfs: true
        show-progress: false
        submodules: recursive
        token: ${{ steps.app-token.outputs.token }}
    - name: Download artifacts
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        merge-multiple: true
    - name: Extract artifacts
      run: for f in halfpipe-artifacts-*.tar; do tar -xvf $f; done; rm halfpipe-artifacts-*.tar
      working-directory: ${{ github.workspace }}
    - name: deploy-ml-zip
      id: deploy-ml-zip
      uses: docker://eu.gcr.io/halfpipe-io/halfpipe-ml-deploy
      with:
        args: -c "cd .e2e/deploy-ml; /ml-deploy/deploy-local-zip"
        entrypoint: /bin/sh
      env:
        APP_NAME: pipeline-name
        DEPLOY_ZIP: target/xquery.zip
        MARKLOGIC_HOST: ml.dev.com
        MARKLOGIC_PASSWORD: ${{ steps.secrets.outputs.springernature_data_shared_halfpipe-ml-deploy_password }}
        MARKLOGIC_USERNAME: ${{ steps.secrets.outputs.springernature_data_shared_halfpipe-ml-deploy_username }}
        USE_BUILD_VERSION: "true"
  deploy_ml-modules_artifact:
    name: Deploy ml-modules artifact
    needs:
    - deploy-ml-zip
    runs-on: ee-runner
    timeout-minutes: 60
    steps:
    - name: Vault secrets
      id: secrets
      uses: hashicorp/vault-action@892a26828f195e65540a40b4768ae4571f51ebfc # v4.0.0
      with:
        exportEnv: false
        method: approle
        roleId: ${{ secrets.VAULT_ROLE_ID }}
        secretId: ${{ secrets.VAULT_SECRET_ID }}
        secrets: |
          /springernature/data/shared/artifactory password | springernature_data_shared_artifactory_password ;
          /springernature/data/shared/artifactory username | springernature_data_shared_artifactory_username ;
          /springernature/data/shared/halfpipe-ml-deploy password | springernature_data_shared_halfpipe-ml-deploy_password ;
        url: ${{ secrets.EE_VAULT_ADDR }}
    - name: Generate GitHub App token
      id: app-token
      uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
      with:
        client-id: ${{ secrets.EE_HALFPIPE_BOT_CLIENT_ID }}
        owner: ${{ github.repository_owner }}
        private-key: ${{ secrets.EE_HALFPIPE_BOT_PRIVATE_KEY }}
    - name: Configure git
      run: |-
        git config --global user.name 'halfpipe-bot[bot]'
        git config --global user.email 'halfpipe-bot[bot]@users.noreply.github.com'
        git config --global url."https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/".insteadOf "git@github.com:"
      working-directory: .
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        lfs: true
        show-progress: false
        submodules: recursive
        token: ${{ steps.app-token.outputs.token }}
    - name: Deploy ml-modules artifact
      id: deploy-ml-modules-artifact
      uses: docker://eu.gcr.io/halfpipe-io/halfpipe-ml-deploy
      with:
        args: -c "cd .e2e/deploy-ml; /ml-deploy/deploy-ml-modules"
        entrypoint: /bin/sh
      env:
        APP_NAME: my-app
        APP_VERSION: v1
        ARTIFACTORY_PASSWORD: ${{ steps.secrets.outputs.springernature_data_shared_artifactory_password }}
        ARTIFACTORY_USERNAME: ${{ steps.secrets.outputs.springernature_data_shared_artifactory_username }}
        MARKLOGIC_HOST: ml.dev.com,ml.qa.com
        MARKLOGIC_PASSWORD: ${{ steps.secrets.outputs.springernature_data_shared_halfpipe-ml-deploy_password }}
        MARKLOGIC_USERNAME: foo
        ML_MODULES_VERSION: "2.1425"
        USE_BUILD_VERSION: "false"
