team: halfpipe-team
pipeline: halfpipe-e2e-deploy-katee

feature_toggles:
- update-pipeline

triggers:
  - type: git
    branch: main
    watched_paths:
      - .e2e/deploy-katee

tasks:
  - type: docker-push
    name: Push default
    image: eu.gcr.io/halfpipe-io/halfpipe-team/someImage
    tag: version

  - type: deploy-katee
    name: deploy to katee
    vela_manifest: vela.yaml
    deployment_check_timeout: 120
    github_environment:
      name: prod
      url: https://prod.url
    vars:
      ENV1: 1234
      ENV2: ((secret.something))
      ENV3: '{"a": "b", "c": "d"}'
      ENV4: ((another.secret))
      VERY_SECRET: ((another.secret))

  - type: deploy-katee
    name: deploy to katee different team
    tag: version
    namespace: katee-different-namespace
    environment: katee-different-environment
    check_interval: 3
    max_checks: 4
    vela_manifest: custom-vela-path.yaml
    vars:
      ENV1: 1234
      ENV2: ((secret.something))
      ENV3: '{"a": "b", "c": "d"}'
      ENV4: ((another.secret))
      VERY_SECRET: ((another.secret))
