# Generated by `halfpipe dependabot`
# yaml-language-server: $schema=https://json.schemastore.org/dependabot-2.0.json
# Dependabot silently skips labels that don't exist in the repo. Create them with:
#   for label in dependencies docker docker-compose github-actions gomod gradle; do gh label create "$label" --force; done
#
version: 2
registries:
  sn-artifactory:
    type: maven-repository
    url: https://springernature.jfrog.io/artifactory/libs-release/
    username: ${{ secrets.EE_ARTIFACTORY_USERNAME }}
    password: ${{ secrets.EE_ARTIFACTORY_PASSWORD }}
updates:
- package-ecosystem: docker
  directories:
  - /.e2e/artifacts
  - /.e2e/deploy-katee
  - /.e2e/docker-push
  - /.e2e/docker-push-with-docker-trigger
  - /.e2e/docker-push-with-update-pipeline
  - /.e2e/docker-push/dockerfiles
  - /.e2e/exec
  - /.e2e/trigger-timer
  - /.e2e/update-pipeline
  schedule:
    interval: weekly
  cooldown:
    default-days: 5
  open-pull-requests-limit: 10
  labels:
  - dependencies
  - docker
  commit-message:
    prefix: chore
    include: scope
  groups:
    all:
      patterns:
      - '*'
- package-ecosystem: docker-compose
  directories:
  - /.e2e/artifacts
  - /.e2e/consumer-integration-test
  - /.e2e/deploy-cf
  - /.e2e/docker-compose
  - /.e2e/exec
  - /.e2e/update-pipeline
  - /.e2e/update-pipeline-and-tag
  schedule:
    interval: weekly
  cooldown:
    default-days: 5
  open-pull-requests-limit: 10
  labels:
  - dependencies
  - docker-compose
  commit-message:
    prefix: chore
    include: scope
  groups:
    all:
      patterns:
      - '*'
- package-ecosystem: github-actions
  directories:
  - /
  schedule:
    interval: weekly
  cooldown:
    default-days: 5
  open-pull-requests-limit: 10
  labels:
  - dependencies
  - github-actions
  commit-message:
    prefix: chore
    include: scope
  groups:
    all:
      patterns:
      - '*'
  ignore:
  - dependency-name: springernature/*
    update-types:
    - version-update:semver-minor
    - version-update:semver-patch
- package-ecosystem: gomod
  directories:
  - /
  schedule:
    interval: weekly
  cooldown:
    default-days: 5
  open-pull-requests-limit: 10
  labels:
  - dependencies
  - gomod
  commit-message:
    prefix: chore
    include: scope
  groups:
    major:
      update-types:
      - major
    minor-and-patch:
      update-types:
      - minor
      - patch
- package-ecosystem: gradle
  directories:
  - /.e2e/dependabot
  schedule:
    interval: weekly
  cooldown:
    default-days: 5
  open-pull-requests-limit: 10
  labels:
  - dependencies
  - gradle
  commit-message:
    prefix: chore
    include: scope
  groups:
    major:
      update-types:
      - major
    minor-and-patch:
      update-types:
      - minor
      - patch
  registries:
  - sn-artifactory
