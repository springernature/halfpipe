# Generated using halfpipe cli version 0.0.0-DEV from file .e2e/github-statuses/.halfpipe.io.yml for team halfpipe-team
jobs:
- build_log_retention:
    minimum_succeeded_builds: 1
  name: update
  on_failure:
    attempts: 2
    no_get: true
    params:
      state: failure
    put: github-statuses
    timeout: 2h
  on_success:
    attempts: 2
    no_get: true
    params:
      state: success
    put: github-statuses
    timeout: 2h
  plan:
  - attempts: 2
    get: git
    params:
      depth: 1
    timeout: 2h
    trigger: true
  - attempts: 2
    config:
      image_resource:
        name: ""
        source:
          password: ((gcp:platform-gar/token.token))
          registry_mirror:
            host: eu-mirror.gcr.io
          repository: eu.gcr.io/halfpipe-io/halfpipe-auto-update
          tag: latest
          username: oauth2accesstoken
        type: registry-image
      inputs:
      - name: git
      params:
        CONCOURSE_PASSWORD: ((platform/concourse.password))
        CONCOURSE_TEAM: ((platform/concourse.team))
        CONCOURSE_URL: ((platform/concourse.url))
        CONCOURSE_USERNAME: ((platform/concourse.username))
        HALFPIPE_DOMAIN: halfpipe.io
        HALFPIPE_FILE_PATH: .halfpipe.io.yml
        HALFPIPE_PROJECT: halfpipe-io
        PIPELINE_NAME: halfpipe-e2e-run
      platform: linux
      run:
        dir: git/.e2e/github-statuses
        path: update-pipeline
    task: update
    timeout: 2h
  - attempts: 2
    no_get: true
    params:
      bump: minor
    put: version
    timeout: 2h
  serial: true
- build_log_retention:
    minimum_succeeded_builds: 1
  name: test
  on_failure:
    attempts: 2
    no_get: true
    params:
      state: failure
    put: github-statuses
    timeout: 2h
  on_success:
    attempts: 2
    no_get: true
    params:
      state: success
    put: github-statuses
    timeout: 2h
  plan:
  - attempts: 2
    in_parallel:
      fail_fast: true
      steps:
      - get: git
        params:
          depth: 1
        passed:
        - update
      - get: version
        passed:
        - update
        trigger: true
    timeout: 2h
  - config:
      caches:
      - path: ../../../var/halfpipe/cache
      - path: ../../../halfpipe-cache
      image_resource:
        name: ""
        source:
          registry_mirror:
            host: eu-mirror.gcr.io
          repository: alpine
          tag: test
        type: registry-image
      inputs:
      - name: git
      - name: version
      params:
        ARTIFACTORY_PASSWORD: ((artifactory.password))
        ARTIFACTORY_URL: ((artifactory.url))
        ARTIFACTORY_USERNAME: ((artifactory.username))
        CI: "true"
        EAID: APPL-437
        EE_PLATFORM_TEAM: halfpipe-team
        RUNNING_IN_CI: "true"
      platform: linux
      run:
        args:
        - -c
        - |
          if ! which bash > /dev/null && [ "$SUPPRESS_BASH_WARNING" != "true" ]; then
            echo "WARNING: Bash is not present in the docker image"
            echo "If your script depends on bash you will get a strange error message like:"
            echo "  sh: yourscript.sh: command not found"
            echo "To fix, make sure your docker image contains bash!"
            echo "Or if you are sure you don't need bash you can suppress this warning by setting the environment variable \"SUPPRESS_BASH_WARNING\" to \"true\"."
            echo ""
            echo ""
          fi

          if [ -e /etc/alpine-release ]
          then
            echo "WARNING: you are running your build in an Alpine based image"
            echo "There is a known issue where DNS resolving does not work as expected"
            echo "https://github.com/gliderlabs/docker-alpine/issues/255"
            echo "If you see any errors related to resolving hostnames the best course of action is to switch to another image"
            echo "we recommend debian as an alternative"
            echo ""
            echo ""
          fi

          export GIT_REVISION=`cat ../../.git/ref`
          export BUILD_VERSION=`cat ../../../version/version`

          ./a
          EXIT_STATUS=$?
          if [ $EXIT_STATUS != 0 ] ; then
            exit 1
          fi
        dir: git/.e2e/github-statuses
        path: /bin/sh
    task: test
    timeout: 1h
  serial: true
