resource_types:
- check_every: 24h0m0s
  name: halfpipe-github-statuses-resource
  source:
    password: ((gcp:platform-gar/token.token))
    repository: eu.gcr.io/halfpipe-io/engineering-enablement/github-status-resource
    username: oauth2accesstoken
  type: registry-image
resources:
- check_every: 10m0s
  name: git
  source:
    branch: main
    paths:
    - .e2e/github-statuses
    private_key: ((halfpipe-github.private_key))
    uri: git@github.com:springernature/halfpipe.git
  type: git
- check_every: 24h0m0s
  name: version
  source:
    bucket: ((halfpipe-semver.bucket))
    driver: gcs
    json_key: ((halfpipe-semver.private_key))
    key: halfpipe-team-halfpipe-e2e-run
  type: semver
- check_every: 24h0m0s
  name: github-statuses
  source:
    access_token: ((halfpipe-github.statuses-token))
    repo: springernature/halfpipe
  type: halfpipe-github-statuses-resource
var_sources:
- config:
    auth_backend: approle
    auth_params:
      role_id: ((platform/team-ro-app-role.vault_approle_id))
      secret_id: ((platform/team-ro-app-role.vault_approle_secret_id))
    lookup_templates:
    - '{{.Secret}}'
    path_prefix: gcp/impersonated-account/
    url: ((platform/team-ro-app-role.vault_addr))
  name: gcp
  type: vault
