# Generated using halfpipe cli version 0.0.0-DEV from file .e2e/notifications_new_format/.halfpipe.io.yml for team halfpipe-team
name: halfpipe-e2e-notifications
"on":
  push:
    branches:
    - main
    paths:
    - .e2e/notifications_new_format**
    - .github/workflows/halfpipe-e2e-notifications.yml
  workflow_dispatch: {}
permissions:
  contents: read
  actions: read
  security-events: write
  packages: read
env:
  ARTIFACTORY_PASSWORD: ${{ secrets.EE_ARTIFACTORY_PASSWORD }}
  ARTIFACTORY_URL: ${{ secrets.EE_ARTIFACTORY_URL }}
  ARTIFACTORY_USERNAME: ${{ secrets.EE_ARTIFACTORY_USERNAME }}
  BUILD_VERSION: 2.${{ github.run_number }}.0
  GIT_REVISION: ${{ github.sha }}
  RUNNING_IN_CI: "true"
defaults:
  run:
    working-directory: .e2e/notifications_new_format
concurrency: ${{ github.workflow }}
jobs:
  update:
    name: update
    runs-on: ee-runner
    timeout-minutes: 60
    outputs:
      synced: ${{ steps.sync.outputs.synced }}
    steps:
    - name: Generate GitHub App token
      id: app-token
      uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
      with:
        client-id: ${{ secrets.EE_HALFPIPE_BOT_CLIENT_ID }}
        owner: ${{ github.repository_owner }}
        private-key: ${{ secrets.EE_HALFPIPE_BOT_PRIVATE_KEY }}
    - name: Configure git
      run: |-
        git config --global user.name 'halfpipe-bot[bot]'
        git config --global user.email 'halfpipe-bot[bot]@users.noreply.github.com'
        git config --global url."https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/".insteadOf "git@github.com:"
      working-directory: .
    - name: Checkout code
      uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      with:
        lfs: true
        show-progress: false
        submodules: recursive
        token: ${{ steps.app-token.outputs.token }}
    - name: Sync workflow with halfpipe manifest
      id: sync
      run: halfpipe-update-workflow
      env:
        HALFPIPE_FILE_PATH: .halfpipe.io.yml
    - name: Commit and push changes to workflow
      if: steps.sync.outputs.synced == 'false'
      run: |
        if git commit -am "[halfpipe] synced workflow $GITHUB_WORKFLOW with halfpipe manifest" && git push; then
          echo ':white_check_mark: Halfpipe successfully updated the workflow' >> $GITHUB_STEP_SUMMARY
          echo >> $GITHUB_STEP_SUMMARY
          echo 'This happened because the workflow was generated from a halfpipe manifest with the `update-pipeline` feature enabled. It keeps the workflow in sync with the halfpipe manifest.' >> $GITHUB_STEP_SUMMARY
          echo >> $GITHUB_STEP_SUMMARY
          echo '[Halfpipe Documentation](https://ee.public.springernature.app/rel-eng/halfpipe/features/#update_pipeline)' >> $GITHUB_STEP_SUMMARY
        else
          echo ':x: Halfpipe failed to update the workflow' >> $GITHUB_STEP_SUMMARY
          echo >> $GITHUB_STEP_SUMMARY
          echo 'This may have happened because newer git commits have already been pushed. Check for newer pipeline runs or manually trigger the workflow.' >> $GITHUB_STEP_SUMMARY
          echo >> $GITHUB_STEP_SUMMARY
          echo '[Halfpipe Documentation](https://ee.public.springernature.app/rel-eng/halfpipe/features/#update_pipeline)' >> $GITHUB_STEP_SUMMARY
          exit 1
        fi
    - name: 'Notify slack #yo (failure)'
      if: failure()
      uses: slackapi/slack-github-action@dcb1066f776dd043e64d0e8ba94ca15cc7e1875d # v4.0.0
      with:
        method: chat.postMessage
        payload: |-
          channel: "#yo"
          text: "❌ workflow ${{ job.status }} `${{ github.workflow }}` ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        token: ${{ secrets.EE_SLACK_TOKEN }}
    - name: Notify teams (failure)
      if: failure()
      uses: springernature/ee-action-ms-teams@v1
      with:
        platform-team: halfpipe-team
        style: attention
        summary: ❌ GitHub Actions workflow failed
  task1:
    name: task1
    needs:
    - update
    if: needs.update.outputs.synced == 'true'
    runs-on: ee-runner
    timeout-minutes: 60
    steps:
    - name: Vault secrets
      id: secrets
      uses: hashicorp/vault-action@892a26828f195e65540a40b4768ae4571f51ebfc # v4.0.0
      with:
        exportEnv: false
        method: approle
        roleId: ${{ secrets.VAULT_ROLE_ID }}
        secretId: ${{ secrets.VAULT_SECRET_ID }}
        secrets: |
          /springernature/data/halfpipe-team/levels/secret/deep secret | springernature_data_halfpipe-team_levels_secret_deep_secret ;
        url: ${{ secrets.EE_VAULT_ADDR }}
    - name: Generate GitHub App token
      id: app-token
      uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
      with:
        client-id: ${{ secrets.EE_HALFPIPE_BOT_CLIENT_ID }}
        owner: ${{ github.repository_owner }}
        private-key: ${{ secrets.EE_HALFPIPE_BOT_PRIVATE_KEY }}
    - name: Configure git
      run: |-
        git config --global user.name 'halfpipe-bot[bot]'
        git config --global user.email 'halfpipe-bot[bot]@users.noreply.github.com'
        git config --global url."https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/".insteadOf "git@github.com:"
      working-directory: .
    - name: Checkout code
      uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      with:
        lfs: true
        show-progress: false
        submodules: recursive
        token: ${{ steps.app-token.outputs.token }}
    - name: task1
      id: task1
      uses: docker://alpine
      with:
        args: -c "cd .e2e/notifications_new_format; ./a"
        entrypoint: /bin/sh
      env:
        CI: "true"
        EAID: APPL-437
        EE_PLATFORM_TEAM: halfpipe-team
        MULTIPLE: ${{ steps.secrets.outputs.springernature_data_halfpipe-team_levels_secret_deep_secret }}
        RUNNING_IN_CI: "true"
    - name: 'Notify slack #yo (failure)'
      if: failure()
      uses: slackapi/slack-github-action@dcb1066f776dd043e64d0e8ba94ca15cc7e1875d # v4.0.0
      with:
        method: chat.postMessage
        payload: |-
          channel: "#yo"
          text: "❌ workflow ${{ job.status }} `${{ github.workflow }}` ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        token: ${{ secrets.EE_SLACK_TOKEN }}
    - name: Notify teams (failure)
      if: failure()
      uses: springernature/ee-action-ms-teams@v1
      with:
        platform-team: halfpipe-team
        style: attention
        summary: ❌ GitHub Actions workflow failed
    - name: 'Notify slack #yo (success)'
      uses: slackapi/slack-github-action@dcb1066f776dd043e64d0e8ba94ca15cc7e1875d # v4.0.0
      with:
        method: chat.postMessage
        payload: |-
          channel: "#yo"
          text: "✅ workflow ${{ job.status }} `${{ github.workflow }}` ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        token: ${{ secrets.EE_SLACK_TOKEN }}
    - name: Notify teams (success)
      uses: springernature/ee-action-ms-teams@v1
      with:
        platform-team: halfpipe-team
        style: good
        summary: ✅ GitHub Actions workflow passed
  task2:
    name: task2
    needs:
    - task1
    runs-on: ee-runner
    timeout-minutes: 60
    steps:
    - name: Generate GitHub App token
      id: app-token
      uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
      with:
        client-id: ${{ secrets.EE_HALFPIPE_BOT_CLIENT_ID }}
        owner: ${{ github.repository_owner }}
        private-key: ${{ secrets.EE_HALFPIPE_BOT_PRIVATE_KEY }}
    - name: Configure git
      run: |-
        git config --global user.name 'halfpipe-bot[bot]'
        git config --global user.email 'halfpipe-bot[bot]@users.noreply.github.com'
        git config --global url."https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/".insteadOf "git@github.com:"
      working-directory: .
    - name: Checkout code
      uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      with:
        lfs: true
        show-progress: false
        submodules: recursive
        token: ${{ steps.app-token.outputs.token }}
    - name: task2
      id: task2
      uses: docker://alpine
      with:
        args: -c "cd .e2e/notifications_new_format; ./a"
        entrypoint: /bin/sh
      env:
        CI: "true"
        EAID: APPL-437
        EE_PLATFORM_TEAM: halfpipe-team
        RUNNING_IN_CI: "true"
    - name: Notify slack kehe (failure)
      if: failure()
      uses: slackapi/slack-github-action@dcb1066f776dd043e64d0e8ba94ca15cc7e1875d # v4.0.0
      with:
        method: chat.postMessage
        payload: |-
          channel: "kehe"
          text: "Nooooes >:c"
        token: ${{ secrets.EE_SLACK_TOKEN }}
    - name: Notify slack whoop (failure)
      if: failure()
      uses: slackapi/slack-github-action@dcb1066f776dd043e64d0e8ba94ca15cc7e1875d # v4.0.0
      with:
        method: chat.postMessage
        payload: |-
          channel: "whoop"
          text: "Nooooes >:c"
        token: ${{ secrets.EE_SLACK_TOKEN }}
    - name: Notify teams (failure)
      if: failure()
      uses: springernature/ee-action-ms-teams@v1
      with:
        platform-team: halfpipe-team
        style: attention
        summary: ❌ GitHub Actions workflow failed
    - name: Notify slack asdf (success)
      uses: slackapi/slack-github-action@dcb1066f776dd043e64d0e8ba94ca15cc7e1875d # v4.0.0
      with:
        method: chat.postMessage
        payload: |-
          channel: "asdf"
          text: "Wiiiie! \o/"
        token: ${{ secrets.EE_SLACK_TOKEN }}
    - name: Notify slack prws (success)
      uses: slackapi/slack-github-action@dcb1066f776dd043e64d0e8ba94ca15cc7e1875d # v4.0.0
      with:
        method: chat.postMessage
        payload: |-
          channel: "prws"
          text: "Wiiiie! \o/"
        token: ${{ secrets.EE_SLACK_TOKEN }}
    - name: Notify teams (success)
      uses: springernature/ee-action-ms-teams@v1
      with:
        platform-team: halfpipe-team
        style: good
        summary: ✅ GitHub Actions workflow passed
  deploy_to_staging:
    name: deploy to staging
    needs:
    - task2
    runs-on: ee-runner
    timeout-minutes: 60
    steps:
    - name: Vault secrets
      id: secrets
      uses: hashicorp/vault-action@892a26828f195e65540a40b4768ae4571f51ebfc # v4.0.0
      with:
        exportEnv: false
        method: approle
        roleId: ${{ secrets.VAULT_ROLE_ID }}
        secretId: ${{ secrets.VAULT_SECRET_ID }}
        secrets: |
          /springernature/data/halfpipe-team/platform/cloudfoundry api-snpaas | springernature_data_halfpipe-team_platform_cloudfoundry_api-snpaas ;
        url: ${{ secrets.EE_VAULT_ADDR }}
    - name: Generate GitHub App token
      id: app-token
      uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
      with:
        client-id: ${{ secrets.EE_HALFPIPE_BOT_CLIENT_ID }}
        owner: ${{ github.repository_owner }}
        private-key: ${{ secrets.EE_HALFPIPE_BOT_PRIVATE_KEY }}
    - name: Configure git
      run: |-
        git config --global user.name 'halfpipe-bot[bot]'
        git config --global user.email 'halfpipe-bot[bot]@users.noreply.github.com'
        git config --global url."https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/".insteadOf "git@github.com:"
      working-directory: .
    - name: Checkout code
      uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      with:
        lfs: true
        show-progress: false
        submodules: recursive
        token: ${{ steps.app-token.outputs.token }}
    - name: Push
      uses: springernature/ee-action-deploy-cf@v1
      with:
        api: ${{ steps.secrets.outputs.springernature_data_halfpipe-team_platform_cloudfoundry_api-snpaas }}
        appPath: .e2e/notifications_new_format
        cliVersion: cf7
        command: halfpipe-push
        eaid: APPL-437
        gitUri: git@github.com:springernature/halfpipe.git
        manifestPath: .e2e/notifications_new_format/manifest.yml
        org: pe
        password: very-secret
        space: staging
        team: halfpipe-team
        testDomain: springernature.app
        username: michiel
      env:
        CF_ENV_VAR_A: "0.1"
        CF_ENV_VAR_B: "false"
        CF_ENV_VAR_BUILD_URL: https://github.com/${{github.repository}}/actions/runs/${{github.run_id}}
    - name: cf logs --recent
      if: failure()
      uses: springernature/ee-action-deploy-cf@v1
      with:
        api: ${{ steps.secrets.outputs.springernature_data_halfpipe-team_platform_cloudfoundry_api-snpaas }}
        appPath: .e2e/notifications_new_format
        cliVersion: cf7
        command: halfpipe-logs
        manifestPath: .e2e/notifications_new_format/manifest.yml
        org: pe
        password: very-secret
        space: staging
        testDomain: springernature.app
        username: michiel
    - name: Check
      uses: springernature/ee-action-deploy-cf@v1
      with:
        api: ${{ steps.secrets.outputs.springernature_data_halfpipe-team_platform_cloudfoundry_api-snpaas }}
        appPath: .e2e/notifications_new_format
        cliVersion: cf7
        command: halfpipe-check
        manifestPath: .e2e/notifications_new_format/manifest.yml
        org: pe
        password: very-secret
        space: staging
        testDomain: springernature.app
        username: michiel
    - name: run a
      id: run-a
      uses: docker://eu.gcr.io/halfpipe-io/halfpipe-fly
      with:
        args: -c "cd .e2e/notifications_new_format; ./a"
        entrypoint: /bin/sh
      env:
        A: blah
        CI: "true"
        EAID: APPL-437
        EE_PLATFORM_TEAM: halfpipe-team
        RUNNING_IN_CI: "true"
        TEST_ROUTE: halfpipe-example-kotlin-dev-staging-CANDIDATE.springernature.app
    - name: Promote
      uses: springernature/ee-action-deploy-cf@v1
      with:
        api: ${{ steps.secrets.outputs.springernature_data_halfpipe-team_platform_cloudfoundry_api-snpaas }}
        appPath: .e2e/notifications_new_format
        cliVersion: cf7
        command: halfpipe-promote
        manifestPath: .e2e/notifications_new_format/manifest.yml
        org: pe
        password: very-secret
        space: staging
        testDomain: springernature.app
        username: michiel
    - name: Cleanup
      if: ${{ !cancelled() }}
      uses: springernature/ee-action-deploy-cf@v1
      with:
        api: ${{ steps.secrets.outputs.springernature_data_halfpipe-team_platform_cloudfoundry_api-snpaas }}
        appPath: .e2e/notifications_new_format
        cliVersion: cf7
        command: halfpipe-cleanup
        manifestPath: .e2e/notifications_new_format/manifest.yml
        org: pe
        password: very-secret
        space: staging
        testDomain: springernature.app
        username: michiel
    - name: Summary
      run: |-
        echo ":rocket: **Deployment Successful**" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "[SNPaaS Mission Control](https://mission-control.snpaas.eu/)" >> $GITHUB_STEP_SUMMARY
    - name: 'Notify slack #yo (failure)'
      if: failure()
      uses: slackapi/slack-github-action@dcb1066f776dd043e64d0e8ba94ca15cc7e1875d # v4.0.0
      with:
        method: chat.postMessage
        payload: |-
          channel: "#yo"
          text: "❌ workflow ${{ job.status }} `${{ github.workflow }}` ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        token: ${{ secrets.EE_SLACK_TOKEN }}
    - name: Notify teams (failure)
      if: failure()
      uses: springernature/ee-action-ms-teams@v1
      with:
        platform-team: halfpipe-team
        style: attention
        summary: ❌ GitHub Actions workflow failed
    - name: 'Notify slack #yo (success)'
      uses: slackapi/slack-github-action@dcb1066f776dd043e64d0e8ba94ca15cc7e1875d # v4.0.0
      with:
        method: chat.postMessage
        payload: |-
          channel: "#yo"
          text: "✅ workflow ${{ job.status }} `${{ github.workflow }}` ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        token: ${{ secrets.EE_SLACK_TOKEN }}
    - name: Notify teams (success)
      uses: springernature/ee-action-ms-teams@v1
      with:
        platform-team: halfpipe-team
        style: good
        summary: ✅ GitHub Actions workflow passed
