# Generated using halfpipe cli version 0.0.0-DEV from file .e2e/notifications_new_format/.halfpipe.io.yml for team halfpipe-team
name: halfpipe-e2e-notifications
"on":
  push:
    branches:
    - main
    paths:
    - .e2e/notifications_new_format**
    - .github/workflows/halfpipe-e2e-notifications.yml
  workflow_dispatch: {}
permissions:
  contents: read
  actions: read
  security-events: write
env:
  ARTIFACTORY_PASSWORD: ${{ secrets.EE_ARTIFACTORY_PASSWORD }}
  ARTIFACTORY_URL: ${{ secrets.EE_ARTIFACTORY_URL }}
  ARTIFACTORY_USERNAME: ${{ secrets.EE_ARTIFACTORY_USERNAME }}
  BUILD_VERSION: 2.${{ github.run_number }}.0
  GIT_REVISION: ${{ github.sha }}
  RUNNING_IN_CI: "true"
defaults:
  run:
    working-directory: .e2e/notifications_new_format
concurrency: ${{ github.workflow }}
jobs:
  task1:
    name: task1
    runs-on: ee-runner
    timeout-minutes: 60
    steps:
    - name: Vault secrets
      id: secrets
      uses: hashicorp/vault-action@4c06c5ccf5c0761b6029f56cfb1dcf5565918a3b # v3.4.0
      with:
        exportEnv: false
        method: approle
        roleId: ${{ secrets.VAULT_ROLE_ID }}
        secretId: ${{ secrets.VAULT_SECRET_ID }}
        secrets: |
          /springernature/data/halfpipe-team/levels/secret/deep secret | springernature_data_halfpipe-team_levels_secret_deep_secret ;
        url: ${{ secrets.EE_VAULT_ADDR }}
    - name: Generate GitHub App token
      id: app-token
      uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
      with:
        client-id: ${{ secrets.EE_HALFPIPE_BOT_CLIENT_ID }}
        owner: ${{ github.repository_owner }}
        private-key: ${{ secrets.EE_HALFPIPE_BOT_PRIVATE_KEY }}
    - name: Configure git
      run: |-
        git config --global user.name 'halfpipe-bot[bot]'
        git config --global user.email 'halfpipe-bot[bot]@users.noreply.github.com'
        git config --global url."https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/".insteadOf "git@github.com:"
      working-directory: .
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        lfs: true
        show-progress: false
        submodules: recursive
        token: ${{ steps.app-token.outputs.token }}
    - name: task1
      id: task1
      uses: docker://alpine
      with:
        args: -c "cd .e2e/notifications_new_format; ./a"
        entrypoint: /bin/sh
      env:
        CI: "true"
        EAID: APPL-437
        EE_PLATFORM_TEAM: halfpipe-team
        MULTIPLE: ${{ steps.secrets.outputs.springernature_data_halfpipe-team_levels_secret_deep_secret }}
        RUNNING_IN_CI: "true"
    - name: 'Notify slack #yo (failure)'
      if: failure()
      uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c # v3.0.3
      with:
        method: chat.postMessage
        payload: |-
          channel: "#yo"
          text: "❌ workflow ${{ job.status }} `${{ github.workflow }}` ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        token: ${{ secrets.EE_SLACK_TOKEN }}
    - name: Notify teams (failure)
      if: failure()
      uses: springernature/ee-action-ms-teams@v1
      with:
        platform-team: halfpipe-team
        style: attention
        summary: ❌ GitHub Actions workflow failed
    - name: 'Notify slack #yo (success)'
      uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c # v3.0.3
      with:
        method: chat.postMessage
        payload: |-
          channel: "#yo"
          text: "✅ workflow ${{ job.status }} `${{ github.workflow }}` ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        token: ${{ secrets.EE_SLACK_TOKEN }}
    - name: Notify teams (success)
      uses: springernature/ee-action-ms-teams@v1
      with:
        platform-team: halfpipe-team
        style: good
        summary: ✅ GitHub Actions workflow passed
  task2:
    name: task2
    needs:
    - task1
    runs-on: ee-runner
    timeout-minutes: 60
    steps:
    - name: Generate GitHub App token
      id: app-token
      uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
      with:
        client-id: ${{ secrets.EE_HALFPIPE_BOT_CLIENT_ID }}
        owner: ${{ github.repository_owner }}
        private-key: ${{ secrets.EE_HALFPIPE_BOT_PRIVATE_KEY }}
    - name: Configure git
      run: |-
        git config --global user.name 'halfpipe-bot[bot]'
        git config --global user.email 'halfpipe-bot[bot]@users.noreply.github.com'
        git config --global url."https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/".insteadOf "git@github.com:"
      working-directory: .
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        lfs: true
        show-progress: false
        submodules: recursive
        token: ${{ steps.app-token.outputs.token }}
    - name: task2
      id: task2
      uses: docker://alpine
      with:
        args: -c "cd .e2e/notifications_new_format; ./a"
        entrypoint: /bin/sh
      env:
        CI: "true"
        EAID: APPL-437
        EE_PLATFORM_TEAM: halfpipe-team
        RUNNING_IN_CI: "true"
    - name: Notify slack kehe (failure)
      if: failure()
      uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c # v3.0.3
      with:
        method: chat.postMessage
        payload: |-
          channel: "kehe"
          text: "Nooooes >:c"
        token: ${{ secrets.EE_SLACK_TOKEN }}
    - name: Notify slack whoop (failure)
      if: failure()
      uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c # v3.0.3
      with:
        method: chat.postMessage
        payload: |-
          channel: "whoop"
          text: "Nooooes >:c"
        token: ${{ secrets.EE_SLACK_TOKEN }}
    - name: Notify teams (failure)
      if: failure()
      uses: springernature/ee-action-ms-teams@v1
      with:
        platform-team: halfpipe-team
        style: attention
        summary: ❌ GitHub Actions workflow failed
    - name: Notify slack asdf (success)
      uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c # v3.0.3
      with:
        method: chat.postMessage
        payload: |-
          channel: "asdf"
          text: "Wiiiie! \o/"
        token: ${{ secrets.EE_SLACK_TOKEN }}
    - name: Notify slack prws (success)
      uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c # v3.0.3
      with:
        method: chat.postMessage
        payload: |-
          channel: "prws"
          text: "Wiiiie! \o/"
        token: ${{ secrets.EE_SLACK_TOKEN }}
    - name: Notify teams (success)
      uses: springernature/ee-action-ms-teams@v1
      with:
        platform-team: halfpipe-team
        style: good
        summary: ✅ GitHub Actions workflow passed
  deploy_to_staging:
    name: deploy to staging
    needs:
    - task2
    runs-on: ee-runner
    timeout-minutes: 60
    steps:
    - name: Vault secrets
      id: secrets
      uses: hashicorp/vault-action@4c06c5ccf5c0761b6029f56cfb1dcf5565918a3b # v3.4.0
      with:
        exportEnv: false
        method: approle
        roleId: ${{ secrets.VAULT_ROLE_ID }}
        secretId: ${{ secrets.VAULT_SECRET_ID }}
        secrets: |
          /springernature/data/halfpipe-team/platform/cloudfoundry api-snpaas | springernature_data_halfpipe-team_platform_cloudfoundry_api-snpaas ;
        url: ${{ secrets.EE_VAULT_ADDR }}
    - name: Generate GitHub App token
      id: app-token
      uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
      with:
        client-id: ${{ secrets.EE_HALFPIPE_BOT_CLIENT_ID }}
        owner: ${{ github.repository_owner }}
        private-key: ${{ secrets.EE_HALFPIPE_BOT_PRIVATE_KEY }}
    - name: Configure git
      run: |-
        git config --global user.name 'halfpipe-bot[bot]'
        git config --global user.email 'halfpipe-bot[bot]@users.noreply.github.com'
        git config --global url."https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/".insteadOf "git@github.com:"
      working-directory: .
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        lfs: true
        show-progress: false
        submodules: recursive
        token: ${{ steps.app-token.outputs.token }}
    - name: Push
      uses: springernature/ee-action-deploy-cf@v1
      with:
        api: ${{ steps.secrets.outputs.springernature_data_halfpipe-team_platform_cloudfoundry_api-snpaas }}
        appPath: .e2e/notifications_new_format
        cliVersion: cf7
        command: halfpipe-push
        eaid: APPL-437
        gitUri: git@github.com:springernature/halfpipe.git
        manifestPath: .e2e/notifications_new_format/manifest.yml
        org: pe
        password: very-secret
        space: staging
        team: halfpipe-team
        testDomain: springernature.app
        username: michiel
      env:
        CF_ENV_VAR_A: "0.1"
        CF_ENV_VAR_B: "false"
        CF_ENV_VAR_BUILD_URL: https://github.com/${{github.repository}}/actions/runs/${{github.run_id}}
    - name: cf logs --recent
      if: failure()
      uses: springernature/ee-action-deploy-cf@v1
      with:
        api: ${{ steps.secrets.outputs.springernature_data_halfpipe-team_platform_cloudfoundry_api-snpaas }}
        appPath: .e2e/notifications_new_format
        cliVersion: cf7
        command: halfpipe-logs
        manifestPath: .e2e/notifications_new_format/manifest.yml
        org: pe
        password: very-secret
        space: staging
        testDomain: springernature.app
        username: michiel
    - name: Check
      uses: springernature/ee-action-deploy-cf@v1
      with:
        api: ${{ steps.secrets.outputs.springernature_data_halfpipe-team_platform_cloudfoundry_api-snpaas }}
        appPath: .e2e/notifications_new_format
        cliVersion: cf7
        command: halfpipe-check
        manifestPath: .e2e/notifications_new_format/manifest.yml
        org: pe
        password: very-secret
        space: staging
        testDomain: springernature.app
        username: michiel
    - name: run a
      id: run-a
      uses: docker://eu.gcr.io/halfpipe-io/halfpipe-fly
      with:
        args: -c "cd .e2e/notifications_new_format; ./a"
        entrypoint: /bin/sh
      env:
        A: blah
        CI: "true"
        EAID: APPL-437
        EE_PLATFORM_TEAM: halfpipe-team
        RUNNING_IN_CI: "true"
        TEST_ROUTE: halfpipe-example-kotlin-dev-staging-CANDIDATE.springernature.app
    - name: Promote
      uses: springernature/ee-action-deploy-cf@v1
      with:
        api: ${{ steps.secrets.outputs.springernature_data_halfpipe-team_platform_cloudfoundry_api-snpaas }}
        appPath: .e2e/notifications_new_format
        cliVersion: cf7
        command: halfpipe-promote
        manifestPath: .e2e/notifications_new_format/manifest.yml
        org: pe
        password: very-secret
        space: staging
        testDomain: springernature.app
        username: michiel
    - name: Cleanup
      if: ${{ !cancelled() }}
      uses: springernature/ee-action-deploy-cf@v1
      with:
        api: ${{ steps.secrets.outputs.springernature_data_halfpipe-team_platform_cloudfoundry_api-snpaas }}
        appPath: .e2e/notifications_new_format
        cliVersion: cf7
        command: halfpipe-cleanup
        manifestPath: .e2e/notifications_new_format/manifest.yml
        org: pe
        password: very-secret
        space: staging
        testDomain: springernature.app
        username: michiel
    - name: Summary
      run: |-
        echo ":rocket: **Deployment Successful**" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "[SNPaaS Mission Control](https://mission-control.snpaas.eu/)" >> $GITHUB_STEP_SUMMARY
    - name: 'Notify slack #yo (failure)'
      if: failure()
      uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c # v3.0.3
      with:
        method: chat.postMessage
        payload: |-
          channel: "#yo"
          text: "❌ workflow ${{ job.status }} `${{ github.workflow }}` ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        token: ${{ secrets.EE_SLACK_TOKEN }}
    - name: Notify teams (failure)
      if: failure()
      uses: springernature/ee-action-ms-teams@v1
      with:
        platform-team: halfpipe-team
        style: attention
        summary: ❌ GitHub Actions workflow failed
    - name: 'Notify slack #yo (success)'
      uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c # v3.0.3
      with:
        method: chat.postMessage
        payload: |-
          channel: "#yo"
          text: "✅ workflow ${{ job.status }} `${{ github.workflow }}` ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        token: ${{ secrets.EE_SLACK_TOKEN }}
    - name: Notify teams (success)
      uses: springernature/ee-action-ms-teams@v1
      with:
        platform-team: halfpipe-team
        style: good
        summary: ✅ GitHub Actions workflow passed
