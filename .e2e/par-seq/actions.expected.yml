# Generated using halfpipe cli version 0.0.0-DEV from file .e2e/par-seq/.halfpipe.io.yml for team halfpipe-team
name: par-seq
"on":
  push:
    branches:
    - main
  workflow_dispatch: {}
permissions:
  contents: read
  actions: read
  security-events: write
env:
  ARTIFACTORY_PASSWORD: ${{ secrets.EE_ARTIFACTORY_PASSWORD }}
  ARTIFACTORY_URL: ${{ secrets.EE_ARTIFACTORY_URL }}
  ARTIFACTORY_USERNAME: ${{ secrets.EE_ARTIFACTORY_USERNAME }}
  BUILD_VERSION: 2.${{ github.run_number }}.0
  GIT_REVISION: ${{ github.sha }}
  RUNNING_IN_CI: "true"
defaults:
  run:
    working-directory: .e2e/par-seq
concurrency: ${{ github.workflow }}
jobs:
  task_1:
    name: task 1
    runs-on: ee-runner
    timeout-minutes: 60
    steps:
    - name: Generate GitHub App token
      id: app-token
      uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
      with:
        client-id: ${{ secrets.EE_GITHUB_APP_CLIENT_ID }}
        owner: ${{ github.repository_owner }}
        private-key: ${{ secrets.EE_GITHUB_APP_PRIVATE_KEY }}
    - name: Configure git for GitHub App token
      run: |-
        git config --global user.name 'halfpipe-io[bot]'
        git config --global user.email 'halfpipe-io[bot]@users.noreply.github.com'
        git config --global url."https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/".insteadOf "git@github.com:"
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        lfs: true
        show-progress: false
        submodules: recursive
        token: ${{ steps.app-token.outputs.token }}
    - name: task 1
      id: task-1
      uses: docker://alpine:latest
      with:
        args: -c "cd .e2e/par-seq; \date"
        entrypoint: /bin/sh
      env:
        CI: "true"
        EAID: APPL-437
        EE_PLATFORM_TEAM: halfpipe-team
        RUNNING_IN_CI: "true"
