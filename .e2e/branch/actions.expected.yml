# Generated using halfpipe cli version 0.0.0-DEV from file .e2e/branch/.halfpipe.io.yml for team halfpipe-team
name: halfpipe-e2e-run
"on":
  push:
    branches:
    - feature-a/branch-b
    paths:
    - .e2e/run**
    - .github/workflows/halfpipe-e2e-run.yml
  workflow_dispatch: {}
permissions:
  contents: read
  actions: read
  security-events: write
env:
  ARTIFACTORY_PASSWORD: ${{ secrets.EE_ARTIFACTORY_PASSWORD }}
  ARTIFACTORY_URL: ${{ secrets.EE_ARTIFACTORY_URL }}
  ARTIFACTORY_USERNAME: ${{ secrets.EE_ARTIFACTORY_USERNAME }}
  BUILD_VERSION: 2.${{ github.run_number }}.0
  GIT_REVISION: ${{ github.sha }}
  RUNNING_IN_CI: "true"
defaults:
  run:
    working-directory: .e2e/branch
concurrency: ${{ github.workflow }}
jobs:
  with_vars_and_secrets:
    name: with vars and secrets
    runs-on: ee-runner
    timeout-minutes: 62
    steps:
    - name: Vault secrets
      id: secrets
      uses: hashicorp/vault-action@4c06c5ccf5c0761b6029f56cfb1dcf5565918a3b # v3.4.0
      with:
        exportEnv: false
        method: approle
        roleId: ${{ secrets.VAULT_ROLE_ID }}
        secretId: ${{ secrets.VAULT_SECRET_ID }}
        secrets: |
          /springernature/data/halfpipe-team/levels/secret/deep secret | springernature_data_halfpipe-team_levels_secret_deep_secret ;
          /springernature/data/halfpipe-team/path/to/map key | springernature_data_halfpipe-team_path_to_map_key ;
          /springernature/data/halfpipe-team/something cool | springernature_data_halfpipe-team_something_cool ;
          /springernature/data/halfpipe-team/something cooler | springernature_data_halfpipe-team_something_cooler ;
          /springernature/data/shared/halfpipe-slack token | springernature_data_shared_halfpipe-slack_token ;
        url: https://vault.halfpipe.io
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        lfs: true
        show-progress: false
        ssh-key: ${{ secrets.EE_GITHUB_PRIVATE_KEY }}
        submodules: recursive
    - name: with vars and secrets
      id: with-vars-and-secrets
      uses: docker://eu.gcr.io/halfpipe-io/golang:1.15
      with:
        args: -c "cd .e2e/branch; \foo"
        entrypoint: /bin/sh
      env:
        BAR: bar
        CI: "true"
        DEEP_SECRET: ${{ steps.secrets.outputs.springernature_data_halfpipe-team_path_to_map_key }}
        EAID: APPL-437
        EE_PLATFORM_TEAM: halfpipe-team
        FOO: foo
        MULTIPLE: ${{ steps.secrets.outputs.springernature_data_halfpipe-team_levels_secret_deep_secret }}
        RUNNING_IN_CI: "true"
        SECRET1: ${{ steps.secrets.outputs.springernature_data_halfpipe-team_something_cool }}
        SECRET2: ${{ steps.secrets.outputs.springernature_data_halfpipe-team_something_cooler }}
        SHARED_SECRET: ${{ steps.secrets.outputs.springernature_data_shared_halfpipe-slack_token }}
  private_registry:
    name: private registry
    needs:
    - with_vars_and_secrets
    runs-on: ee-runner
    timeout-minutes: 60
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        lfs: true
        show-progress: false
        ssh-key: ${{ secrets.EE_GITHUB_PRIVATE_KEY }}
        submodules: recursive
    - name: Login to Docker Registry
      uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
      with:
        password: docker-password
        registry: my.private.registry
        username: docker-user
    - name: private registry
      id: private-registry
      uses: docker://my.private.registry/repo/golang:1.15
      with:
        args: -c "cd .e2e/branch; \bash -c \"echo hello\""
        entrypoint: /bin/sh
      env:
        CI: "true"
        EAID: APPL-437
        EE_PLATFORM_TEAM: halfpipe-team
        RUNNING_IN_CI: "true"
