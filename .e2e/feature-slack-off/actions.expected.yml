# Generated using halfpipe cli version 0.0.0-DEV from file .e2e/feature-slack-off/.halfpipe.io.yml for team halfpipe-team
name: halfpipe-e2e-notifications
"on":
  push:
    branches:
    - main
    paths:
    - .e2e/feature-slack-off**
    - .github/workflows/halfpipe-e2e-notifications.yml
  workflow_dispatch: {}
permissions:
  contents: read
  actions: read
  security-events: write
env:
  ARTIFACTORY_PASSWORD: ${{ secrets.EE_ARTIFACTORY_PASSWORD }}
  ARTIFACTORY_URL: ${{ secrets.EE_ARTIFACTORY_URL }}
  ARTIFACTORY_USERNAME: ${{ secrets.EE_ARTIFACTORY_USERNAME }}
  BUILD_VERSION: 2.${{ github.run_number }}.0
  GIT_REVISION: ${{ github.sha }}
  RUNNING_IN_CI: "true"
  VAULT_ROLE_ID: ${{ secrets.VAULT_ROLE_ID }}
  VAULT_SECRET_ID: ${{ secrets.VAULT_SECRET_ID }}
defaults:
  run:
    working-directory: .e2e/feature-slack-off
concurrency: ${{ github.workflow }}
jobs:
  my_run_task:
    name: my run task
    runs-on: ee-runner
    timeout-minutes: 60
    steps:
    - name: Vault secrets
      id: secrets
      uses: hashicorp/vault-action@4c06c5ccf5c0761b6029f56cfb1dcf5565918a3b # v3.4.0
      with:
        exportEnv: false
        method: approle
        roleId: ${{ env.VAULT_ROLE_ID }}
        secretId: ${{ env.VAULT_SECRET_ID }}
        secrets: |
          /springernature/data/halfpipe-team/secret webhook1 | springernature_data_halfpipe-team_secret_webhook1 ;
        url: https://vault.halfpipe.io
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        lfs: true
        show-progress: false
        ssh-key: ${{ secrets.EE_GITHUB_PRIVATE_KEY }}
        submodules: recursive
    - name: my run task
      id: my-run-task
      uses: docker://foo
      with:
        args: -c "cd .e2e/feature-slack-off; \foo"
        entrypoint: /bin/sh
      env:
        CI: "true"
        EAID: APPL-437
        EE_PLATFORM_TEAM: halfpipe-team
        RUNNING_IN_CI: "true"
    - name: 'Notify slack #failure1 (failure)'
      if: failure()
      uses: slackapi/slack-github-action@af78098f536edbc4de71162a307590698245be95 # v3.0.1
      with:
        method: chat.postMessage
        payload: |-
          channel: "#failure1"
          text: "❌ workflow ${{ job.status }} `${{ github.workflow }}` ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        token: ${{ secrets.EE_SLACK_TOKEN }}
    - name: Notify teams (failure) (1)
      if: failure()
      uses: jdcargile/ms-teams-notification@28e5ca976c053d54e2b852f3f38da312f35a24fc # v1.4
      with:
        github-token: ${{ github.token }}
        ms-teams-webhook-uri: ${{ steps.secrets.outputs.springernature_data_halfpipe-team_secret_webhook1 }}
        notification-color: dc3545
        notification-summary: ❌ GitHub Actions workflow failed
    - name: Notify teams (failure) (2)
      if: failure()
      uses: jdcargile/ms-teams-notification@28e5ca976c053d54e2b852f3f38da312f35a24fc # v1.4
      with:
        github-token: ${{ github.token }}
        ms-teams-webhook-uri: http://webhook2
        notification-color: dc3545
        notification-summary: ❌ GitHub Actions workflow failed
    - name: Notify teams (failure) (3)
      if: failure()
      uses: jdcargile/ms-teams-notification@28e5ca976c053d54e2b852f3f38da312f35a24fc # v1.4
      with:
        github-token: ${{ github.token }}
        ms-teams-webhook-uri: https://platform-api.ee.springernature.io/api/v1/message?team=halfpipe-team
        notification-color: dc3545
        notification-summary: ❌ GitHub Actions workflow failed
    - name: 'Notify slack #success1 (success)'
      uses: slackapi/slack-github-action@af78098f536edbc4de71162a307590698245be95 # v3.0.1
      with:
        method: chat.postMessage
        payload: |-
          channel: "#success1"
          text: "success message"
        token: ${{ secrets.EE_SLACK_TOKEN }}
    - name: 'Notify slack #success2 (success)'
      uses: slackapi/slack-github-action@af78098f536edbc4de71162a307590698245be95 # v3.0.1
      with:
        method: chat.postMessage
        payload: |-
          channel: "#success2"
          text: "success message"
        token: ${{ secrets.EE_SLACK_TOKEN }}
    - name: Notify teams (success) (1)
      uses: jdcargile/ms-teams-notification@28e5ca976c053d54e2b852f3f38da312f35a24fc # v1.4
      with:
        github-token: ${{ github.token }}
        ms-teams-webhook-uri: http://webhook-success
        notification-color: 28a745
        notification-summary: success message teams
    - name: Notify teams (success) (2)
      uses: jdcargile/ms-teams-notification@28e5ca976c053d54e2b852f3f38da312f35a24fc # v1.4
      with:
        github-token: ${{ github.token }}
        ms-teams-webhook-uri: https://platform-api.ee.springernature.io/api/v1/message?team=halfpipe-team
        notification-color: 28a745
        notification-summary: ✅ GitHub Actions workflow passed
  task2:
    name: task2
    needs:
    - my_run_task
    runs-on: ee-runner
    timeout-minutes: 60
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        lfs: true
        show-progress: false
        ssh-key: ${{ secrets.EE_GITHUB_PRIVATE_KEY }}
        submodules: recursive
    - name: task2
      id: task2
      uses: docker://alpine
      with:
        args: -c "cd .e2e/feature-slack-off; ./a"
        entrypoint: /bin/sh
      env:
        CI: "true"
        EAID: APPL-437
        EE_PLATFORM_TEAM: halfpipe-team
        RUNNING_IN_CI: "true"
    - name: Notify slack kehe (failure)
      if: failure()
      uses: slackapi/slack-github-action@af78098f536edbc4de71162a307590698245be95 # v3.0.1
      with:
        method: chat.postMessage
        payload: |-
          channel: "kehe"
          text: "Nooooes >:c"
        token: ${{ secrets.EE_SLACK_TOKEN }}
    - name: Notify teams (failure) (1)
      if: failure()
      uses: jdcargile/ms-teams-notification@28e5ca976c053d54e2b852f3f38da312f35a24fc # v1.4
      with:
        github-token: ${{ github.token }}
        ms-teams-webhook-uri: https://custom.webhook.url
        notification-color: dc3545
        notification-summary: Nooooes >:c
    - name: Notify teams (failure) (2)
      if: failure()
      uses: jdcargile/ms-teams-notification@28e5ca976c053d54e2b852f3f38da312f35a24fc # v1.4
      with:
        github-token: ${{ github.token }}
        ms-teams-webhook-uri: https://platform-api.ee.springernature.io/api/v1/message?team=halfpipe-team
        notification-color: dc3545
        notification-summary: ❌ GitHub Actions workflow failed
    - name: Notify slack asdf (success)
      uses: slackapi/slack-github-action@af78098f536edbc4de71162a307590698245be95 # v3.0.1
      with:
        method: chat.postMessage
        payload: |-
          channel: "asdf"
          text: "Wiiiie! \o/"
        token: ${{ secrets.EE_SLACK_TOKEN }}
    - name: Notify teams (success)
      uses: jdcargile/ms-teams-notification@28e5ca976c053d54e2b852f3f38da312f35a24fc # v1.4
      with:
        github-token: ${{ github.token }}
        ms-teams-webhook-uri: https://platform-api.ee.springernature.io/api/v1/message?team=halfpipe-team
        notification-color: 28a745
        notification-summary: ✅ GitHub Actions workflow passed
  deploy_to_staging:
    name: deploy to staging
    needs:
    - task2
    runs-on: ee-runner
    timeout-minutes: 60
    steps:
    - name: Vault secrets
      id: secrets
      uses: hashicorp/vault-action@4c06c5ccf5c0761b6029f56cfb1dcf5565918a3b # v3.4.0
      with:
        exportEnv: false
        method: approle
        roleId: ${{ env.VAULT_ROLE_ID }}
        secretId: ${{ env.VAULT_SECRET_ID }}
        secrets: |
          /springernature/data/halfpipe-team/cloudfoundry api-snpaas | springernature_data_halfpipe-team_cloudfoundry_api-snpaas ;
        url: https://vault.halfpipe.io
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        lfs: true
        show-progress: false
        ssh-key: ${{ secrets.EE_GITHUB_PRIVATE_KEY }}
        submodules: recursive
    - name: Push
      uses: springernature/ee-action-deploy-cf@v1
      with:
        api: ${{ steps.secrets.outputs.springernature_data_halfpipe-team_cloudfoundry_api-snpaas }}
        appPath: .e2e/feature-slack-off
        cliVersion: cf7
        command: halfpipe-push
        eaid: APPL-437
        gitUri: git@github.com:springernature/halfpipe.git
        manifestPath: .e2e/feature-slack-off/manifest.yml
        org: pe
        password: very-secret
        space: staging
        team: halfpipe-team
        testDomain: springernature.app
        username: michiel
      env:
        CF_ENV_VAR_A: "0.1"
        CF_ENV_VAR_B: "false"
        CF_ENV_VAR_BUILD_URL: https://github.com/${{github.repository}}/actions/runs/${{github.run_id}}
    - name: cf logs --recent
      if: failure()
      uses: springernature/ee-action-deploy-cf@v1
      with:
        api: ${{ steps.secrets.outputs.springernature_data_halfpipe-team_cloudfoundry_api-snpaas }}
        appPath: .e2e/feature-slack-off
        cliVersion: cf7
        command: halfpipe-logs
        manifestPath: .e2e/feature-slack-off/manifest.yml
        org: pe
        password: very-secret
        space: staging
        testDomain: springernature.app
        username: michiel
    - name: Check
      uses: springernature/ee-action-deploy-cf@v1
      with:
        api: ${{ steps.secrets.outputs.springernature_data_halfpipe-team_cloudfoundry_api-snpaas }}
        appPath: .e2e/feature-slack-off
        cliVersion: cf7
        command: halfpipe-check
        manifestPath: .e2e/feature-slack-off/manifest.yml
        org: pe
        password: very-secret
        space: staging
        testDomain: springernature.app
        username: michiel
    - name: run a
      id: run-a
      uses: docker://eu.gcr.io/halfpipe-io/halfpipe-fly
      with:
        args: -c "cd .e2e/feature-slack-off; ./a"
        entrypoint: /bin/sh
      env:
        A: blah
        CI: "true"
        EAID: APPL-437
        EE_PLATFORM_TEAM: halfpipe-team
        RUNNING_IN_CI: "true"
        TEST_ROUTE: halfpipe-example-kotlin-dev-staging-CANDIDATE.springernature.app
    - name: Promote
      uses: springernature/ee-action-deploy-cf@v1
      with:
        api: ${{ steps.secrets.outputs.springernature_data_halfpipe-team_cloudfoundry_api-snpaas }}
        appPath: .e2e/feature-slack-off
        cliVersion: cf7
        command: halfpipe-promote
        manifestPath: .e2e/feature-slack-off/manifest.yml
        org: pe
        password: very-secret
        space: staging
        testDomain: springernature.app
        username: michiel
    - name: Cleanup
      if: ${{ !cancelled() }}
      uses: springernature/ee-action-deploy-cf@v1
      with:
        api: ${{ steps.secrets.outputs.springernature_data_halfpipe-team_cloudfoundry_api-snpaas }}
        appPath: .e2e/feature-slack-off
        cliVersion: cf7
        command: halfpipe-cleanup
        manifestPath: .e2e/feature-slack-off/manifest.yml
        org: pe
        password: very-secret
        space: staging
        testDomain: springernature.app
        username: michiel
    - name: Summary
      run: |-
        echo ":rocket: **Deployment Successful**" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "[SNPaaS Mission Control](https://mission-control.snpaas.eu/)" >> $GITHUB_STEP_SUMMARY
    - name: 'Notify slack #yo (failure)'
      if: failure()
      uses: slackapi/slack-github-action@af78098f536edbc4de71162a307590698245be95 # v3.0.1
      with:
        method: chat.postMessage
        payload: |-
          channel: "#yo"
          text: "❌ workflow ${{ job.status }} `${{ github.workflow }}` ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        token: ${{ secrets.EE_SLACK_TOKEN }}
    - name: Notify teams (failure)
      if: failure()
      uses: jdcargile/ms-teams-notification@28e5ca976c053d54e2b852f3f38da312f35a24fc # v1.4
      with:
        github-token: ${{ github.token }}
        ms-teams-webhook-uri: https://platform-api.ee.springernature.io/api/v1/message?team=halfpipe-team
        notification-color: dc3545
        notification-summary: ❌ GitHub Actions workflow failed
    - name: 'Notify slack #yo (success)'
      uses: slackapi/slack-github-action@af78098f536edbc4de71162a307590698245be95 # v3.0.1
      with:
        method: chat.postMessage
        payload: |-
          channel: "#yo"
          text: "✅ workflow ${{ job.status }} `${{ github.workflow }}` ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        token: ${{ secrets.EE_SLACK_TOKEN }}
    - name: Notify teams (success)
      uses: jdcargile/ms-teams-notification@28e5ca976c053d54e2b852f3f38da312f35a24fc # v1.4
      with:
        github-token: ${{ github.token }}
        ms-teams-webhook-uri: https://platform-api.ee.springernature.io/api/v1/message?team=halfpipe-team
        notification-color: 28a745
        notification-summary: ✅ GitHub Actions workflow passed
