  deploy_rolling_with_pre-promote:
    name: deploy rolling with pre-promote
    needs:
    - deploy_rolling_plain
    runs-on: ee-runner
    timeout-minutes: 5
    steps:
    - name: Generate GitHub App token
      id: app-token
      uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
      with:
        client-id: ${{ secrets.EE_GITHUB_APP_CLIENT_ID }}
        owner: ${{ github.repository_owner }}
        private-key: ${{ secrets.EE_GITHUB_APP_PRIVATE_KEY }}
    - name: Configure git for GitHub App token
      run: |-
        git config --global user.name 'halfpipe-io[bot]'
        git config --global user.email 'halfpipe-io[bot]@users.noreply.github.com'
        git config --global url."https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/".insteadOf "git@github.com:"
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        lfs: true
        show-progress: false
        submodules: recursive
        token: ${{ steps.app-token.outputs.token }}
    - name: Push
      uses: springernature/ee-action-deploy-cf@v1
      with:
        api: dev-api
        appPath: .e2e/deploy-cf
        cliVersion: cf7
        command: halfpipe-push
        eaid: APPL-437
        gitUri: git@github.com:springernature/halfpipe.git
        manifestPath: .e2e/deploy-cf/manifest.yml
        org: halfpipe-team
        password: very-secret
        space: dev
        team: halfpipe-team
        testDomain: some.random.domain.com
        username: michiel
      env:
        CF_ENV_VAR_BUILD_URL: https://github.com/${{github.repository}}/actions/runs/${{github.run_id}}
    - name: cf logs --recent
      if: failure()
      uses: springernature/ee-action-deploy-cf@v1
      with:
        api: dev-api
        appPath: .e2e/deploy-cf
        cliVersion: cf7
        command: halfpipe-logs
        manifestPath: .e2e/deploy-cf/manifest.yml
        org: halfpipe-team
        password: very-secret
        space: dev
        testDomain: some.random.domain.com
        username: michiel
    - name: Check
      uses: springernature/ee-action-deploy-cf@v1
      with:
        api: dev-api
        appPath: .e2e/deploy-cf
        cliVersion: cf7
        command: halfpipe-check
        manifestPath: .e2e/deploy-cf/manifest.yml
        org: halfpipe-team
        password: very-secret
        space: dev
        testDomain: some.random.domain.com
        username: michiel
    - name: pre promote step
      id: pre-promote-step
      uses: docker://eu.gcr.io/halfpipe-io/halfpipe-fly
      with:
        args: -c "cd .e2e/deploy-cf; ./smoke-test.sh"
        entrypoint: /bin/sh
      env:
        A: blah
        CI: "true"
        EAID: APPL-437
        EE_PLATFORM_TEAM: halfpipe-team
        RUNNING_IN_CI: "true"
        TEST_ROUTE: halfpipe-example-kotlin-dev-dev-CANDIDATE.some.random.domain.com
    - name: Promote
      uses: springernature/ee-action-deploy-cf@v1
      with:
        api: dev-api
        appPath: .e2e/deploy-cf
        cliVersion: cf7
        command: halfpipe-promote
        manifestPath: .e2e/deploy-cf/manifest.yml
