# Generated using halfpipe cli version 0.0.0-DEV from file .e2e/run/.halfpipe.io.yml for team halfpipe-team
name: halfpipe-e2e-run
"on":
  push:
    branches:
    - main
    paths:
    - .e2e/run**
    - .github/workflows/halfpipe-e2e-run.yml
  workflow_dispatch: {}
permissions:
  contents: read
  actions: read
  security-events: write
env:
  ARTIFACTORY_PASSWORD: ${{ secrets.EE_ARTIFACTORY_PASSWORD }}
  ARTIFACTORY_URL: ${{ secrets.EE_ARTIFACTORY_URL }}
  ARTIFACTORY_USERNAME: ${{ secrets.EE_ARTIFACTORY_USERNAME }}
  BUILD_VERSION: 2.${{ github.run_number }}.0
  GIT_REVISION: ${{ github.sha }}
  RUNNING_IN_CI: "true"
defaults:
  run:
    working-directory: .e2e/run
concurrency: ${{ github.workflow }}
jobs:
  with_vars_and_secrets:
    name: with vars and secrets
    runs-on: ee-runner
    timeout-minutes: 62
    steps:
    - name: Vault secrets
      id: secrets
      uses: hashicorp/vault-action@892a26828f195e65540a40b4768ae4571f51ebfc # v4.0.0
      with:
        exportEnv: false
        method: approle
        roleId: ${{ secrets.VAULT_ROLE_ID }}
        secretId: ${{ secrets.VAULT_SECRET_ID }}
        secrets: |
          /springernature/data/halfpipe-team/levels/secret/deep secret | springernature_data_halfpipe-team_levels_secret_deep_secret ;
          /springernature/data/halfpipe-team/path/to/map key | springernature_data_halfpipe-team_path_to_map_key ;
          /springernature/data/halfpipe-team/something cool | springernature_data_halfpipe-team_something_cool ;
          /springernature/data/halfpipe-team/something cooler | springernature_data_halfpipe-team_something_cooler ;
          /springernature/data/shared/halfpipe-slack token | springernature_data_shared_halfpipe-slack_token ;
        url: ${{ secrets.EE_VAULT_ADDR }}
    - name: Generate GitHub App token
      id: app-token
      uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
      with:
        client-id: ${{ secrets.EE_HALFPIPE_BOT_CLIENT_ID }}
        owner: ${{ github.repository_owner }}
        private-key: ${{ secrets.EE_HALFPIPE_BOT_PRIVATE_KEY }}
    - name: Configure git
      run: |-
        git config --global user.name 'halfpipe-bot[bot]'
        git config --global user.email 'halfpipe-bot[bot]@users.noreply.github.com'
        git config --global url."https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/".insteadOf "git@github.com:"
      working-directory: .
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        lfs: true
        show-progress: false
        submodules: recursive
        token: ${{ steps.app-token.outputs.token }}
    - name: with vars and secrets
      id: with-vars-and-secrets
      uses: docker://eu.gcr.io/halfpipe-io/golang:1.15
      with:
        args: -c "cd .e2e/run; \foo"
        entrypoint: /bin/sh
      env:
        BAR: bar
        CI: "true"
        DEEP_SECRET: ${{ steps.secrets.outputs.springernature_data_halfpipe-team_path_to_map_key }}
        EAID: APPL-437
        EE_PLATFORM_TEAM: halfpipe-team
        FOO: foo
        MULTIPLE: ${{ steps.secrets.outputs.springernature_data_halfpipe-team_levels_secret_deep_secret }}
        RUNNING_IN_CI: "true"
        SECRET1: ${{ steps.secrets.outputs.springernature_data_halfpipe-team_something_cool }}
        SECRET2: ${{ steps.secrets.outputs.springernature_data_halfpipe-team_something_cooler }}
        SHARED_SECRET: ${{ steps.secrets.outputs.springernature_data_shared_halfpipe-slack_token }}
  privileged_and_build_history:
    name: privileged and build_history
    needs:
    - with_vars_and_secrets
    runs-on: ee-runner
    timeout-minutes: 60
    steps:
    - name: Generate GitHub App token
      id: app-token
      uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
      with:
        client-id: ${{ secrets.EE_HALFPIPE_BOT_CLIENT_ID }}
        owner: ${{ github.repository_owner }}
        private-key: ${{ secrets.EE_HALFPIPE_BOT_PRIVATE_KEY }}
    - name: Configure git
      run: |-
        git config --global user.name 'halfpipe-bot[bot]'
        git config --global user.email 'halfpipe-bot[bot]@users.noreply.github.com'
        git config --global url."https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/".insteadOf "git@github.com:"
      working-directory: .
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        lfs: true
        show-progress: false
        submodules: recursive
        token: ${{ steps.app-token.outputs.token }}
    - name: privileged and build_history
      id: privileged-and-build_history
      uses: docker://alpine:test
      with:
        args: -c "cd .e2e/run; ./a"
        entrypoint: /bin/sh
      env:
        CI: "true"
        EAID: APPL-437
        EE_PLATFORM_TEAM: halfpipe-team
        RUNNING_IN_CI: "true"
  private_registry:
    name: private registry
    needs:
    - privileged_and_build_history
    runs-on: ee-runner
    timeout-minutes: 60
    steps:
    - name: Generate GitHub App token
      id: app-token
      uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
      with:
        client-id: ${{ secrets.EE_HALFPIPE_BOT_CLIENT_ID }}
        owner: ${{ github.repository_owner }}
        private-key: ${{ secrets.EE_HALFPIPE_BOT_PRIVATE_KEY }}
    - name: Configure git
      run: |-
        git config --global user.name 'halfpipe-bot[bot]'
        git config --global user.email 'halfpipe-bot[bot]@users.noreply.github.com'
        git config --global url."https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/".insteadOf "git@github.com:"
      working-directory: .
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        lfs: true
        show-progress: false
        submodules: recursive
        token: ${{ steps.app-token.outputs.token }}
    - name: Login to Docker Registry
      uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
      with:
        password: docker-password
        registry: my.private.registry
        username: docker-user
    - name: private registry
      id: private-registry
      uses: docker://my.private.registry/repo/golang:1.15
      with:
        args: -c "cd .e2e/run; \bash -c \"echo hello\""
        entrypoint: /bin/sh
      env:
        CI: "true"
        EAID: APPL-437
        EE_PLATFORM_TEAM: halfpipe-team
        RUNNING_IN_CI: "true"
