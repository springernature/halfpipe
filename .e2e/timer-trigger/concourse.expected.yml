# Generated using halfpipe cli version 0.0.0-DEV from file .e2e/timer-trigger/.halfpipe.io.yml for team halfpipe-team
jobs:
- build_log_retention:
    minimum_succeeded_builds: 1
  name: run \echo hello
  plan:
  - attempts: 2
    in_parallel:
      fail_fast: true
      steps:
      - get: cron
        trigger: true
      - get: git
        trigger: true
    timeout: 2h
  - config:
      caches:
      - path: ../../../var/halfpipe/cache
      - path: ../../../halfpipe-cache
      image_resource:
        name: ""
        source:
          registry_mirror:
            host: eu-mirror.gcr.io
          repository: alpine
          tag: latest
        type: registry-image
      inputs:
      - name: git
      params:
        ARTIFACTORY_PASSWORD: ((artifactory.password))
        ARTIFACTORY_URL: ((artifactory.url))
        ARTIFACTORY_USERNAME: ((artifactory.username))
        CI: "true"
        EAID: APPL-437
        EE_PLATFORM_TEAM: halfpipe-team
        RUNNING_IN_CI: "true"
      platform: linux
      run:
        args:
        - -c
        - |
          if ! which bash > /dev/null && [ "$SUPPRESS_BASH_WARNING" != "true" ]; then
            echo "WARNING: Bash is not present in the docker image"
            echo "If your script depends on bash you will get a strange error message like:"
            echo "  sh: yourscript.sh: command not found"
            echo "To fix, make sure your docker image contains bash!"
            echo "Or if you are sure you don't need bash you can suppress this warning by setting the environment variable \"SUPPRESS_BASH_WARNING\" to \"true\"."
            echo ""
            echo ""
          fi

          if [ -e /etc/alpine-release ]
          then
            echo "WARNING: you are running your build in a Alpine image or one that is based on the Alpine"
            echo "There is a known issue where DNS resolving does not work as expected"
            echo "https://github.com/gliderlabs/docker-alpine/issues/255"
            echo "If you see any errors related to resolving hostnames the best course of action is to switch to another image"
            echo "we recommend debian:buster-slim as an alternative"
            echo ""
            echo ""
          fi

          export GIT_REVISION=`cat ../../.git/ref`

          \echo hello
          EXIT_STATUS=$?
          if [ $EXIT_STATUS != 0 ] ; then
            exit 1
          fi
        dir: git/.e2e/timer-trigger
        path: /bin/sh
    task: run-echo-hello
    timeout: 1h
  serial: true
resource_types:
- check_every: 24h0m0s
  name: halfpipe-cron-resource
  source:
    password: ((halfpipe-gcr.private_key))
    repository: eu.gcr.io/halfpipe-io/halfpipe-cron-resource
    tag: stable
    username: _json_key
  type: registry-image
resources:
- check_every: 10m0s
  name: cron
  source:
    expression: 5 4 * * 0-5
    fire_immediately: true
    location: UTC
  type: halfpipe-cron-resource
- check_every: 10m0s
  name: git
  source:
    branch: main
    private_key: ((halfpipe-github.private_key))
    uri: git@github.com:springernature/halfpipe.git
  type: git
var_sources:
- config:
    auth_backend: approle
    auth_params:
      role_id: ((platform/team-ro-app-role.vault_approle_id))
      secret_id: ((platform/team-ro-app-role.vault_approle_secret_id))
    lookup_templates:
    - '{{.Secret}}'
    path_prefix: gcp/impersonated-account/
    url: ((platform/team-ro-app-role.vault_addr))
  name: gcp
  type: vault
