# Generated using halfpipe cli version 0.0.0-DEV from file .e2e/trigger-timer/.halfpipe.io.yml for team engineering-enablement
name: halfpipe-e2e-trigger-timer
"on":
  push:
    branches:
    - main
  schedule:
  - cron: 5 4 * * 0-5
  workflow_dispatch: {}
permissions:
  contents: read
  actions: read
  security-events: write
env:
  ARTIFACTORY_PASSWORD: ${{ secrets.EE_ARTIFACTORY_PASSWORD }}
  ARTIFACTORY_URL: ${{ secrets.EE_ARTIFACTORY_URL }}
  ARTIFACTORY_USERNAME: ${{ secrets.EE_ARTIFACTORY_USERNAME }}
  BUILD_VERSION: 2.${{ github.run_number }}.0
  GIT_REVISION: ${{ github.sha }}
  RUNNING_IN_CI: "true"
defaults:
  run:
    working-directory: .e2e/trigger-timer
concurrency: ${{ github.workflow }}
jobs:
  hello:
    name: hello
    runs-on: ee-runner
    timeout-minutes: 60
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        lfs: true
        show-progress: false
        ssh-key: ${{ secrets.EE_GITHUB_PRIVATE_KEY }}
        submodules: recursive
    - name: hello
      id: hello
      uses: docker://alpine
      with:
        args: -c "cd .e2e/trigger-timer; \echo hello"
        entrypoint: /bin/sh
      env:
        CI: "true"
        EAID: APPL-437
        EE_PLATFORM_TEAM: engineering-enablement
        RUNNING_IN_CI: "true"
