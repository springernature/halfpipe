          tag: latest
          username: oauth2accesstoken
        type: registry-image
      inputs:
      - name: git
      outputs:
      - name: artifacts-out
      - name: artifacts-out-failure
      params:
        ARTIFACTORY_PASSWORD: ((artifactory.password))
        ARTIFACTORY_URL: ((artifactory.url))
        ARTIFACTORY_USERNAME: ((artifactory.username))
        CI: "true"
        CONSUMER_GIT_KEY: ((halfpipe-github.private_key))
        CONSUMER_GIT_URI: git@github.com:springernature/c-consumer
        CONSUMER_HOST: c-host
        CONSUMER_NAME: c-consumer
        CONSUMER_PATH: ""
        CONSUMER_SCRIPT: c-script
        DOCKER_COMPOSE_FILE: ""
        DOCKER_COMPOSE_SERVICE: ""
        EAID: APPL-437
        EE_PLATFORM_TEAM: halfpipe-team
        GAR_TOKEN: ((gcp:platform-gar/token.token))
        GIT_CLONE_OPTIONS: ""
        HALFPIPE_CACHE_TEAM: halfpipe-team
        PROVIDER_HOST: ""
        PROVIDER_HOST_KEY: HALFPIPE_E2E_ARTIFACTS_DEPLOYED_HOST
        PROVIDER_NAME: halfpipe-e2e-artifacts
        RUNNING_IN_CI: "true"
        USE_COVENANT: "true"
      platform: linux
      run:
        args:
        - -c
        - |-
          copyArtifact() {
            ARTIFACT=$1
            ARTIFACT_OUT_PATH=$2

            if [ -e $ARTIFACT ] ; then
              mkdir -p $ARTIFACT_OUT_PATH
              cp -r $ARTIFACT $ARTIFACT_OUT_PATH
            else
              echo "ERROR: Artifact '$ARTIFACT' not found. Try fly hijack to check the filesystem."
              exit 1
            fi
          }

          export GIT_REVISION=`cat ../../.git/ref`

          \export ENV_OPTIONS="-e ARTIFACTORY_PASSWORD -e ARTIFACTORY_URL -e ARTIFACTORY_USERNAME -e CI -e EAID -e EE_PLATFORM_TEAM -e RUNNING_IN_CI"
          export VOLUME_OPTIONS="-v /var/halfpipe/cache:/var/halfpipe/cache -v /var/halfpipe/shared-cache:/var/halfpipe/shared-cache -v /var/run/docker.sock:/var/run/docker.sock"
          run-cdc.sh
          EXIT_STATUS=$?
          if [ $EXIT_STATUS != 0 ] ; then
            # Artifacts to copy in case of failure
            copyArtifact docker-compose.yml ../../../artifacts-out-failure/.e2e/artifacts
            copyArtifact tests ../../../artifacts-out-failure/.e2e/artifacts
            exit 1
          fi

          # Artifacts to copy from task
          copyArtifact docker-compose.yml ../../../artifacts-out/.e2e/artifacts
        dir: git/.e2e/artifacts
        path: docker.sh
    privileged: true
    task: c-name-covenant
    timeout: 1h
  - attempts: 2
    no_get: true
    params:
      folder: artifacts-out
      version_file: git/.git/ref
    put: artifacts
    timeout: 2h
